<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" />
<title>IELTS Quest OS</title>
<style>
:root{
  --bg:#0f172a;--bg2:#111827;--card:#111c33;--card2:#0b1220;
  --muted:#94a3b8;--text:#e5e7eb;--line:#263550;
  --accent:#38bdf8;--accent2:#22d3ee;
  --ok:#22c55e;--warn:#f59e0b;--bad:#ef4444;
  --soft:#17223a;--ink:#00111a;
  --radius:20px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(56,189,248,.08), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(34,197,94,.06), transparent 60%),
    linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"PingFang SC","Hiragino Sans GB",sans-serif;
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
}
#app{max-width:920px;margin:0 auto;min-height:100vh;padding:14px 16px calc(110px + env(safe-area-inset-bottom))}

/* Topbar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:sticky;top:0;z-index:10;
  background:rgba(15,23,42,.85);backdrop-filter:saturate(140%) blur(14px);
  -webkit-backdrop-filter:saturate(140%) blur(14px);
  padding:12px 4px 14px;margin:0 -4px;
  border-bottom:1px solid rgba(38,53,80,.6);
}
.topbar .brand{display:flex;align-items:center;gap:10px;min-width:0}
.logo{
  width:34px;height:34px;border-radius:10px;flex:0 0 34px;
  background:linear-gradient(135deg,var(--accent),var(--ok));
  display:grid;place-items:center;color:#001018;font-weight:900;font-size:18px;
  box-shadow:0 6px 18px rgba(56,189,248,.35);
}
.topbar h1{font-size:18px;margin:0;letter-spacing:.2px}
.topbar p{font-size:12px;color:var(--muted);margin:2px 0 0}
.topbar .actions{display:flex;gap:6px}
.ghost{
  background:transparent;border:1px solid var(--line);color:var(--text);
  border-radius:12px;padding:8px 10px;font-size:13px;cursor:pointer;
  font-family:inherit;
}
.ghost:hover{background:var(--soft)}
.ghost.small{padding:6px 9px;font-size:12px}
.ghost.active{background:var(--accent);color:var(--ink);border-color:var(--accent);font-weight:700}

/* Cards */
.card{
  background:linear-gradient(180deg,rgba(17,28,51,.92),rgba(17,28,51,.85));
  border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;box-shadow:0 10px 28px rgba(0,0,0,.22);
  margin-bottom:12px;
}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.stack{display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.split{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Module tiles */
.module{
  text-align:left;cursor:pointer;background:linear-gradient(180deg,rgba(17,28,51,.92),rgba(17,28,51,.85));
  border:1px solid var(--line);border-radius:var(--radius);padding:16px;
  color:var(--text);transition:transform .15s ease, border-color .15s ease;
  min-height:120px;display:flex;flex-direction:column;gap:6px;
  font-family:inherit;
}
.module:hover{transform:translateY(-2px);border-color:#3b4d75}
.module:active{transform:translateY(0)}
.module h2{margin:0;font-size:18px;display:flex;align-items:center;gap:8px}
.module h2 .ic{
  width:26px;height:26px;border-radius:8px;display:inline-grid;place-items:center;
  background:var(--soft);border:1px solid var(--line);font-size:14px;
}
.module p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}
.module .done-mark{margin-top:auto;display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ok)}

/* Stats / pills / badges */
.stat{display:flex;gap:8px;flex-wrap:wrap}
.pill{
  border:1px solid var(--line);background:var(--soft);border-radius:999px;
  padding:7px 10px;font-size:12.5px;color:var(--text);font-weight:600;
}
.pill .k{color:var(--muted);font-weight:500;margin-right:4px}
.badge{
  font-size:11.5px;border:1px solid var(--line);border-radius:8px;
  padding:4px 7px;color:var(--muted);background:rgba(11,18,32,.6);
}
.progress{
  height:10px;background:#0b1220;border-radius:999px;overflow:hidden;
  border:1px solid var(--line);margin-top:12px;
}
.progress .bar{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--ok));
  width:0%;transition:width .4s ease;
}

/* Buttons */
.btn{
  border:0;border-radius:14px;background:var(--accent);color:var(--ink);
  font-weight:800;padding:11px 14px;cursor:pointer;font-size:14px;
  transition:filter .15s ease, transform .05s ease;
  font-family:inherit;
}
.btn:hover{filter:brightness(1.05)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn.secondary{background:#24324d;color:var(--text);border:1px solid var(--line)}
.btn.ok{background:var(--ok);color:#052e16}
.btn.warn{background:var(--warn);color:#241504}
.btn.bad{background:var(--bad);color:#fff}

/* Vocab */
.word{font-size:46px;line-height:1.05;margin:14px 0 6px;font-weight:900;letter-spacing:-.5px}
.pos{color:var(--accent);font-weight:800;text-transform:uppercase;letter-spacing:.08em;font-size:13px}
.phon{color:var(--muted);font-size:14px}
.meaning{font-size:22px;margin:14px 0 8px;font-weight:700}
.example{
  border-left:3px solid var(--accent);padding:6px 0 6px 12px;
  color:#cbd5e1;font-size:15px;line-height:1.6;
}
.kbd-hint{font-size:11.5px;color:var(--muted);margin-top:10px}
kbd{
  background:#0b1220;border:1px solid var(--line);border-bottom-width:2px;
  border-radius:6px;padding:1px 6px;font-size:11px;color:#cbd5e1;font-family:inherit;
}

/* Inputs */
.textarea,input[type=text],input[type=number],input:not([type]),select{
  width:100%;background:var(--card2);color:var(--text);
  border:1px solid var(--line);border-radius:12px;padding:11px 12px;
  font-size:15px;font-family:inherit;
}
.textarea{min-height:220px;line-height:1.65;resize:vertical}
input:focus,.textarea:focus,select:focus{outline:none;border-color:var(--accent)}

/* Timer */
.timer{
  font-variant-numeric:tabular-nums;font-size:28px;font-weight:900;
  padding:4px 10px;border-radius:10px;background:var(--card2);
  border:1px solid var(--line);min-width:90px;text-align:center;
}
.timer.running{color:var(--accent);border-color:var(--accent)}
.timer.done{color:var(--bad);border-color:var(--bad)}

/* Bottom nav */
.bottom-nav{
  position:fixed;left:50%;bottom:12px;transform:translateX(-50%);
  width:min(920px,calc(100vw - 24px));
  background:rgba(15,23,42,.96);border:1px solid var(--line);
  border-radius:22px;padding:6px;display:grid;grid-template-columns:repeat(7,1fr);
  gap:4px;z-index:5;box-shadow:0 10px 30px rgba(0,0,0,.45);
}
.bottom-nav button{
  background:transparent;border:0;color:var(--muted);padding:9px 2px;
  border-radius:14px;font-size:12px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.2;
  font-family:inherit;
}
.bottom-nav button .nav-ic{font-size:16px}
.bottom-nav button.active{background:#1e293b;color:var(--text)}
.bottom-nav button:hover{color:var(--text)}

/* Quote / checklist */
.quote{
  background:var(--card2);border:1px dashed #334155;border-radius:14px;
  padding:12px 14px;color:#cbd5e1;font-size:15px;line-height:1.6;margin:8px 0;
}
.checklist label{display:flex;gap:10px;align-items:flex-start;margin:8px 0;color:#cbd5e1;font-size:14px;cursor:pointer}
.checklist input{width:auto;margin-top:3px}

/* Toast */
.toast{
  position:fixed;left:50%;bottom:90px;transform:translateX(-50%);
  background:#e5e7eb;color:#0f172a;padding:10px 16px;border-radius:999px;
  font-weight:800;z-index:99;font-size:14px;
  box-shadow:0 12px 32px rgba(0,0,0,.4);
  animation:toast-in .2s ease;
}
@keyframes toast-in{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

/* Misc */
.muted{color:var(--muted);font-size:13px;line-height:1.6}
.danger{color:#fecaca}
.good{color:#bbf7d0}
.warnText{color:#fde68a}
.section-title{font-size:16px;margin:14px 0 8px;font-weight:700}
h2{font-size:18px;margin:0 0 8px}
h3{font-size:15px;margin:14px 0 8px}
details{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin:8px 0}
details summary{cursor:pointer;color:var(--accent);font-weight:600;font-size:13px}
details[open] summary{margin-bottom:8px}

.q-card{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:12px;margin:8px 0}
.q-card b{font-size:14.5px}

.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}

.empty{text-align:center;padding:24px 12px;color:var(--muted)}
.empty .em{font-size:32px;margin-bottom:8px}

/* Responsive */
@media(max-width:640px){
  #app{padding:12px 12px calc(110px + env(safe-area-inset-bottom))}
  .grid,.split{grid-template-columns:1fr}
  .word{font-size:38px}
  .bottom-nav{bottom:calc(8px + env(safe-area-inset-bottom));grid-template-columns:repeat(7,1fr)}
  .bottom-nav button{font-size:10px;padding:8px 1px}
  .topbar{align-items:flex-start}
  .topbar .actions{flex-wrap:wrap;justify-content:flex-end;max-width:132px}
  .topbar h1{font-size:16px}
  .card{padding:14px;border-radius:18px}
  .module{padding:14px}
}

</style>
</head>

s for quiet study?","How can students book group rooms?"]},{"title":"Student Project Meeting","level":"Section 3","text":"I think our presentation should focus on renewable energy in cities. That sounds good, but we need specific examples. We could compare solar panels and public transport policies. Let us divide the work: I will analyse the data, and you can prepare the introduction.","tasks":["听人物分工。","听写 compare / analyse / introduction。","记录每个人负责什么。","跟读角色对话。"],"qs":["What topic will the presentation focus on?","What two examples are mentioned?","Who will prepare the introduction?"]},{"title":"Lecture on Memory","level":"Section 4","text":"Spaced repetition is based on the idea that information is remembered better when reviews are spread over time. Retrieval practice is also important because trying to recall information strengthens memory more effectively than simply rereading notes.","tasks":["听关键词：spaced repetition / retrieval practice。","听写第一句。","用中文解释两种学习策略。","英文复述核心观点。"],"qs":["What is spaced repetition based on?","Why is retrieval practice important?","What is less effective than recalling information?"]}],"reading":[{"title":"Urban Transport","type":"T/F/NG","passage":"Many cities are investing in public transport to reduce traffic congestion. Buses and trains can move large numbers of people using less road space than private cars. However, public transport only works well when it is reliable, affordable and connected to residential areas. Some experts argue that cities should also improve walking and cycling infrastructure.","qs":[{"q":"Public transport always reduces pollution immediately.","a":"Not Given","why":"文章说减少拥堵，不等于立即减少污染。"},{"q":"Reliability is one condition for effective public transport.","a":"True","why":"原文明确说 only works well when it is reliable。"},{"q":"Experts suggest improving facilities for walking and cycling.","a":"True","why":"最后一句明确提到。"}]},{"title":"Online Education","type":"Matching Headings","passage":"Online education has expanded quickly because it offers flexibility. Students can review recorded lessons and learn at their own speed. Nevertheless, many learners struggle without direct supervision. Successful online courses usually include regular feedback, clear deadlines and opportunities for discussion.","qs":[{"q":"Best heading?","a":"Benefits and limits of online education","why":"文章同时讲灵活优势和缺乏监督的限制。"},{"q":"Find one keyword for the limitation.","a":"supervision","why":"without direct supervision 是限制核心。"}]},{"title":"Food and Health","type":"Sentence Completion","passage":"A balanced diet can improve energy levels and concentration. Nutrition researchers often recommend whole grains, vegetables and sufficient protein. In contrast, diets high in sugar may create short bursts of energy followed by tiredness.","qs":[{"q":"A balanced diet can improve energy and _____.","a":"concentration","why":"原句直接定位。"},{"q":"High-sugar diets may lead to ____ after short energy bursts.","a":"tiredness","why":"followed by tiredness。"}]}],"writing":[{"mode":"Quick Battle","title":"升级句子","prompt":"把句子升级到 Band 7 风格：Many people think online learning is good.","hint":"加入具体对象、原因、让步或条件。"},{"mode":"Task 2","title":"教育类议论文","prompt":"Some people believe that online education is as effective as traditional classroom learning. To what extent do you agree or disagree?","hint":"结构：引言立场 → 主体1支持/反对 → 主体2限制/让步 → 结论。"},{"mode":"Task 1","title":"图表描述框架训练","prompt":"The chart shows changes in the percentage of people using public transport in three cities from 2000 to 2020. Write an introduction and overview.","hint":"不要编数字，先练改写题目和概述趋势。"},{"mode":"Rewrite Arena","title":"修复低分段落","prompt":"Nowadays, technology is very important. It makes people life better. But it also has bad things. So we should use it good.","hint":"目标：修复语法、替换空泛词、加逻辑连接。"}],"speaking":{"part1":["Do you like your hometown? Why?","What do you usually do after work?","Do you prefer studying alone or with others?","How often do you use technology?","What kind of weather do you like?"],"part2":[{"topic":"Describe a useful app you often use.","points":["What it is","When you started using it","How it helps you","Why you find it useful"]},{"topic":"Describe a goal you want to achieve.","points":["What the goal is","Why it matters","What difficulties you may face","How you plan to achieve it"]}],"part3":["How has technology changed education?","Do people rely too much on mobile phones?","What makes a person disciplined?","Should schools teach practical life skills?","Is online learning suitable for everyone?"]},"mock":{"listening":[{"section":"Section 1 · Accommodation","audio":"A student calls Green Road Residence to ask about a single room. The manager says the room is available from the fifteenth of September. The monthly rent is six hundred and twenty pounds, including water and internet, but not electricity. The deposit is one month of rent. The nearest bus stop is outside the library. The student must email a copy of his passport by Friday.","qs":[["Available from which date?","15 September"],["Monthly rent?","620"],["What is included besides water?","internet"],["What is not included?","electricity"],["Deposit amount?","one month"],["Nearest bus stop is outside the _____.","library"],["What document must be emailed?","passport"],["Deadline day?","Friday"],["Type of room?","single"],["Residence name?","Green Road"]]},{"section":"Section 2 · Museum Tour","audio":"Welcome to the Riverside Museum. The ground floor contains the ticket desk, a cafe and a temporary exhibition about local transport. The first floor focuses on photography, while the second floor is for children and school groups. Guided tours start at ten thirty and two fifteen. Visitors should not use flash photography. The gift shop closes at five forty-five.","qs":[["Museum name?","Riverside"],["Temporary exhibition topic?","local transport"],["Photography section is on which floor?","first"],["Children section is on which floor?","second"],["Morning tour starts at?","10:30"],["Afternoon tour starts at?","2:15"],["What kind of photography is not allowed?","flash"],["Gift shop closes at?","5:45"],["Cafe is on the ____ floor.","ground"],["Who uses the second floor besides children?","school groups"]]},{"section":"Section 3 · Seminar Discussion","audio":"Two students discuss their seminar project on online learning. Maya thinks flexibility is the strongest advantage because learners can review recorded lessons. Daniel argues that weak motivation is the main problem. Their tutor recommends comparing survey results with interview data. Maya will write the introduction and Daniel will prepare the charts. They agree to meet again next Tuesday.","qs":[["Project topic?","online learning"],["Maya says the strongest advantage is _____.","flexibility"],["Learners can review recorded _____.","lessons"],["Daniel says the main problem is weak _____.","motivation"],["Tutor recommends comparing survey results with what?","interview data"],["Who writes the introduction?","Maya"],["Who prepares the charts?","Daniel"],["They will meet next _____.","Tuesday"],["Data type one?","survey results"],["Data type two?","interview data"]]},{"section":"Section 4 · Urban Green Space","audio":"Urban green space can improve public health in several ways. Parks encourage physical activity and reduce stress. Trees lower summer temperatures and may improve air quality. However, benefits are not equally distributed. Wealthier districts often have larger parks and better maintenance. Researchers suggest that cities should measure access, safety and quality when planning future green areas.","qs":[["Green space can improve public _____.","health"],["Parks encourage physical _____.","activity"],["Parks reduce _____.","stress"],["Trees lower summer _____.","temperatures"],["Trees may improve air _____.","quality"],["Benefits are not equally _____.","distributed"],["Which districts often have larger parks?","wealthier"],["Better what is mentioned?","maintenance"],["Cities should measure access, safety and _____.","quality"],["Planning future green _____.","areas"]]}],"reading":[{"title":"Passage 1 · Sleep and Learning","text":"Sleep is not passive rest. During deep sleep, the brain strengthens useful memories and removes some weaker traces. Students who study late but sleep very little often perform worse than students who review earlier and sleep enough. Short naps may also improve attention, although they cannot replace regular night sleep.","qs":[["Sleep is only passive rest.","False"],["Deep sleep strengthens useful memories.","True"],["Very little sleep can damage performance.","True"],["Short naps fully replace night sleep.","False"],["The passage says caffeine improves memory.","Not Given"],["What type of sleep is mentioned?","deep sleep"],["What may improve attention?","short naps"],["Students should review earlier and sleep _____.","enough"],["Weak traces may be removed by the _____.","brain"],["Main topic?","sleep and learning"]]},{"title":"Passage 2 · Public Libraries","text":"Public libraries have changed from quiet book rooms into community learning centres. Many now provide digital resources, language clubs and job-search workshops. Their value is greatest when services match local needs. However, libraries still face funding pressure, especially in smaller towns where visitor numbers are lower.","qs":[["Libraries are described as community learning centres.","True"],["All libraries have unlimited funding.","False"],["Language clubs are one service mentioned.","True"],["Services should match local needs.","True"],["Smaller towns always have more visitors.","False"],["Libraries provide digital _____.","resources"],["They also provide job-search _____.","workshops"],["Funding pressure is a continuing _____.","problem"],["Visitor numbers are lower in smaller _____.","towns"],["Best heading?","changing role of libraries"]]},{"title":"Passage 3 · Food Waste","text":"Food waste occurs at farms, shops, restaurants and homes. In high-income countries, consumers throw away large amounts of edible food because of poor planning or confusion about date labels. Reducing waste requires better storage, smaller portions and public education. Technology can help, but behaviour change remains essential.","qs":[["Food waste happens only at home.","False"],["Date labels can confuse consumers.","True"],["Better storage can reduce waste.","True"],["Technology alone solves the problem.","False"],["The passage compares five countries.","Not Given"],["Consumers throw away edible _____.","food"],["One cause is poor _____.","planning"],["Restaurants are one place where waste _____.","occurs"],["Smaller portions are recommended.","True"],["Behaviour change remains _____.","essential"]]},{"title":"Passage 4 · Remote Work","text":"Remote work offers flexibility and reduces commuting time. Yet it can blur the boundary between work and private life. Some employees feel isolated when informal office conversations disappear. Hybrid schedules may provide a balance, but they require clear communication and fair access to promotion opportunities.","qs":[["Remote work reduces commuting time.","True"],["Remote work always improves private life.","False"],["Some employees feel isolated.","True"],["Hybrid schedules may provide balance.","True"],["Promotion opportunities should be fair.","True"],["Remote work offers _____.","flexibility"],["It can blur the boundary between work and ____ life.","private"],["Informal office conversations may _____.","disappear"],["Hybrid work requires clear _____.","communication"],["Main risk mentioned?","isolation"]]}],"writingTask1":"The chart shows the percentage of adults using public transport in three cities from 2000 to 2020. Summarise the main trends and make comparisons where relevant.","writingTask2":"Some people believe that young people should focus on practical skills rather than academic subjects. To what extent do you agree or disagree?","speaking":{"part1":["Where do you live?","Do you prefer studying in the morning or at night?","What kind of apps help you study?"],"part2":"Describe a skill you want to improve. You should say what it is, why you want to improve it, how you will practise it, and how it may help your future.","part3":["Why do some people fail to keep learning plans?","Should schools teach more practical skills?","How will technology change language learning?"]}}};

const __modules__ = {"app.js":"// app.js — entry point\nimport { render } from 'https://esm.sh/preact@10.19.6';\nimport { html } from 'https://esm.sh/htm@3.1.1/preact?external=preact';\nimport { useEffect, useState } from 'https://esm.sh/preact@10.19.6/hooks';\n\nimport { state, mutate, markActive, flushSave, importState, resetAll, pruneOldInputs } from './state.js';\nimport { initTTS, stopSpeak, ttsState } from './tts.js';\nimport { stopTimer, timer } from './timer.js';\nimport { todayKey } from './utils.js';\nimport { toast } from './toast.js';\n\nimport { Home } from './views/home.js';\nimport { Vocab } from './views/vocab.js';\nimport { Listening } from './views/listening.js';\nimport { Reading } from './views/reading.js';\nimport { Writing } from './views/writing.js';\nimport { Speaking } from './views/speaking.js';\nimport { Mock } from './views/mock.js';\nimport { Theory } from './views/theory.js';\n\nconst SUBTITLES = {\n  home: '每天只做能提高分数的事',\n  vocab: '主动回忆 + 间隔复习',\n  listening: '精听 + 听写 + 跟读',\n  reading: '定位词 + 题型策略',\n  writing: '在线编辑 + 计时 + 启发式诊断',\n  speaking: 'Part 1 / 2 / 3 计时输出',\n  mock: '完整模考 + 客观判分 + 启发式估算',\n  theory: '设计依据 / 数据安全',\n};\n\nconst NAV_ITEMS = [\n  { view: 'home',      icon: '🏠', label: '首页' },\n  { view: 'vocab',     icon: '📖', label: '单词' },\n  { view: 'listening', icon: '🎧', label: '听力' },\n  { view: 'reading',   icon: '📄', label: '阅读' },\n  { view: 'writing',   icon: '✍️', label: '写作' },\n  { view: 'speaking',  icon: '🎙️', label: '口语' },\n  { view: 'mock',      icon: '🧪', label: '模考' },\n];\n\nfunction nav(view) {\n  stopTimer();\n  stopSpeak();\n  mutate(s => { s.view = view; });\n  window.scrollTo({ top: 0, behavior: 'auto' });\n}\n\nfunction App({ data }) {\n  // 让组件随 state / timer / ttsState 变化重渲染\n  const [, force] = useState(0);\n  useEffect(() => {\n    const rerender = () => force(n => n + 1);\n    const unsubs = [\n      state.subscribe(rerender),\n      timer.subscribe(rerender),\n      ttsState.subscribe(rerender),\n    ];\n    return () => unsubs.forEach(fn => fn && fn());\n  }, []);\n\n  const view = state.value.view || 'home';\n\n  // 初始化：标记今日活跃 + 清理老 inputs\n  useEffect(() => {\n    markActive();\n    pruneOldInputs();\n    initTTS();\n  }, []);\n\n  function doExport() {\n    const blob = new Blob([JSON.stringify(state.value, null, 2)], { type: 'application/json' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url;\n    a.download = `ielts-quest-os_${todayKey()}.json`;\n    document.body.appendChild(a); a.click(); a.remove();\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n    toast('已导出 JSON');\n  }\n\n  function doImport() {\n    const input = document.createElement('input');\n    input.type = 'file';\n    input.accept = 'application/json';\n    input.onchange = async e => {\n      const f = e.target.files[0];\n      if (!f) return;\n      try {\n        const txt = await f.text();\n        const data = JSON.parse(txt);\n        if (!confirm('确定用导入文件覆盖当前进度？')) return;\n        importState(data);\n        nav('home');\n        toast('导入成功');\n      } catch (err) {\n        alert('导入失败：' + err.message);\n      }\n    };\n    input.click();\n  }\n\n  function doReset() {\n    if (confirm('确定清空所有本地进度？此操作不可恢复。')) {\n      resetAll();\n      nav('home');\n    }\n  }\n\n  let content;\n  switch (view) {\n    case 'vocab':     content = html`<${Vocab}     words=${data.words} />`; break;\n    case 'listening': content = html`<${Listening} items=${data.listening} />`; break;\n    case 'reading':   content = html`<${Reading}   items=${data.reading} />`; break;\n    case 'writing':   content = html`<${Writing}   items=${data.writing} />`; break;\n    case 'speaking':  content = html`<${Speaking}  data=${data.speaking} />`; break;\n    case 'mock':      content = html`<${Mock}      data=${data.mock} />`; break;\n    case 'theory':    content = html`<${Theory} />`; break;\n    case 'home':\n    default:          content = html`<${Home} words=${data.words} nav=${nav} />`;\n  }\n\n  return html`\n    <header class=\"topbar\">\n      <div class=\"brand\">\n        ${view !== 'home' ? html`<button class=\"ghost\" aria-label=\"返回\" onClick=${() => nav('home')}>←</button>` : null}\n        <div class=\"logo\">Q</div>\n        <div style=\"min-width:0\">\n          <h1>IELTS Quest OS</h1>\n          <p>${SUBTITLES[view] || '自用雅思闯关系统'}</p>\n        </div>\n      </div>\n      <div class=\"actions\">\n        <button class=\"ghost small\" title=\"导出进度\" onClick=${doExport}>导出</button>\n        <button class=\"ghost small\" title=\"导入进度\" onClick=${doImport}>导入</button>\n        <button class=\"ghost small\" title=\"清空所有数据\" onClick=${doReset}>重置</button>\n      </div>\n    </header>\n\n    <main>${content}</main>\n\n    <nav class=\"bottom-nav\">\n      ${NAV_ITEMS.map(item => html`\n        <button\n          key=${item.view}\n          class=${view === item.view ? 'active' : ''}\n          onClick=${() => nav(item.view)}\n          aria-label=${item.label}\n        >\n          <span class=\"nav-ic\">${item.icon}</span>\n          <span>${item.label}</span>\n        </button>\n      `)}\n    </nav>\n  `;\n}\n\n// 启动（数据从全局内联）\nasync function start() {\n  const data = window.__BUNDLED_DATA__;\n  const root = document.getElementById('app');\n  render(html`<${App} data=${data} />`, root);\n}\nstart().catch(err => {\n  console.error(err);\n  document.getElementById('app').innerHTML = '<div class=\"card\"><h2>启动失败</h2><p class=\"muted\">' + err.message + '</p></div>';\n});\n  document.getElementById('app').innerHTML = `<div class=\"card\"><h2>启动失败</h2><p class=\"muted\">${err.message}</p><p class=\"muted\">如果你看到的是 CORS 错误，请通过 http 服务器打开（不能直接双击 file://）。</p></div>`;\n});\n","components/PersistentInput.js":"// components/PersistentInput.js\n// 把输入值绑定到 state.inputs[date][fieldId]，刷新不丢\nimport { html } from 'https://esm.sh/htm@3.1.1/preact?external=preact';\nimport { useState, useEffect, useCallback } from 'https://esm.sh/preact@10.19.6/hooks';\nimport { getInput, setInput } from '../state.js';\nimport { debounce } from '../utils.js';\n\nexport function PInput({ fieldId, placeholder, type = 'text', date, ...rest }) {\n  const [val, setVal] = useState(() => getInput(fieldId, date));\n  // debounce 持久化，避免每键 save\n  const persist = useCallback(debounce((v) => setInput(fieldId, v, date), 200), [fieldId, date]);\n\n  return html`\n    <input\n      type=${type}\n      placeholder=${placeholder}\n      value=${val}\n      onInput=${e => { setVal(e.target.value); persist(e.target.value); }}\n      ...${rest}\n    />\n  `;\n}\n\nexport function PTextarea({ fieldId, placeholder, className = 'textarea', style, date, onChange }) {\n  const [val, setVal] = useState(() => getInput(fieldId, date));\n  const persist = useCallback(debounce((v) => {\n    setInput(fieldId, v, date);\n    if (onChange) onChange(v);\n  }, 200), [fieldId, date, onChange]);\n\n  return html`\n    <textarea\n      class=${className}\n      style=${style}\n      placeholder=${placeholder}\n      value=${val}\n      onInput=${e => { setVal(e.target.value); persist(e.target.value); }}\n    ></textarea>\n  `;\n}\n\n// 读取当前持久化的值（用于评分/提交时取数据）\nexport function readPersisted(fieldId, date) {\n  return getInput(fieldId, date);\n}\n","scoring.js":"// scoring.js — heuristic estimator, NOT an IELTS band score\n// 关键设计：明确告诉用户这是估算，不是 Band 分。\n// 输出 5 个等级 L1-L5，对应大致备考阶段，而不是 Band 数字。\n\nimport { wordCountOf } from './utils.js';\n\n// 文本特征统计\nexport function textStats(text) {\n  const t = String(text || '');\n  const words = t.match(/[A-Za-z]+(?:[-'][A-Za-z]+)*/g) || [];\n  const sentences = (t.match(/[.!?]+/g) || []).length || 1;\n  const lower = t.toLowerCase();\n  const lowerWords = words.map(w => w.toLowerCase());\n  const uniqueLower = new Set(lowerWords);\n  const ttr = words.length ? uniqueLower.size / words.length : 0;\n\n  const CONNECTORS = ['however', 'therefore', 'moreover', 'although', 'whereas', 'because',\n    'for example', 'in contrast', 'as a result', 'nevertheless', 'overall', 'furthermore',\n    'consequently', 'in addition', 'on the other hand', 'firstly', 'secondly', 'finally'];\n  const connSet = new Set();\n  let connCount = 0;\n  for (const c of CONNECTORS) {\n    const re = new RegExp(`\\\\b${c}\\\\b`, 'g');\n    const m = lower.match(re);\n    if (m) { connCount += m.length; connSet.add(c); }\n  }\n\n  const COMPLEX_MARKERS = ['which', 'while', 'although', 'because', 'whereas', 'if', 'when', 'since', 'unless', 'whether'];\n  let complex = 0;\n  for (const m of COMPLEX_MARKERS) {\n    const re = new RegExp(`\\\\b${m}\\\\b`, 'g');\n    complex += (lower.match(re) || []).length;\n  }\n\n  // 重复词：超过 3 次的实词（粗略）\n  const freq = {};\n  for (const w of lowerWords) freq[w] = (freq[w] || 0) + 1;\n  const STOPWORDS = new Set(['the','a','an','is','are','was','were','be','to','of','and','or','in','on','at','for','with','as','by','this','that','these','those','it','its','their','they','we','i','you','he','she','have','has','had','do','does','did','not','but','if','so','will','would','can','could','may','might','should','shall']);\n  const repeatedContent = Object.entries(freq)\n    .filter(([w, n]) => n >= 4 && !STOPWORDS.has(w) && w.length > 3)\n    .map(([w]) => w);\n\n  return {\n    n: words.length,\n    sentences,\n    unique: uniqueLower.size,\n    ttr,\n    connectors: connCount,\n    distinctConnectors: connSet.size,\n    complex,\n    avg: words.length / sentences,\n    repeatedContent,\n  };\n}\n\n// 把数值映射到 L1-L5 等级\n// L1: 起步；L2: 基础；L3: 中段；L4: 接近目标；L5: 稳定输出\nfunction toLevel(score) {\n  if (score >= 4.2) return 'L5';\n  if (score >= 3.4) return 'L4';\n  if (score >= 2.6) return 'L3';\n  if (score >= 1.8) return 'L2';\n  return 'L1';\n}\n\nconst LEVEL_LABEL = {\n  L1: '起步',\n  L2: '基础',\n  L3: '中段',\n  L4: '接近目标',\n  L5: '稳定输出',\n};\n\nexport function levelLabel(l) { return LEVEL_LABEL[l] || ''; }\n\n// 写作：返回四维 L1-L5 + 综合 + 诊断\nexport function scoreWriting(text, taskType) {\n  const st = textStats(text);\n  const isTask2 = taskType === 'task2';\n  const minWords = isTask2 ? 250 : 150;\n\n  // 任务回应 / 字数维度\n  let task = 0;\n  if (st.n >= minWords) task = 4;\n  else if (st.n >= minWords * 0.85) task = 3;\n  else if (st.n >= minWords * 0.6) task = 2;\n  else if (st.n >= 50) task = 1;\n\n  // 连贯：连接词种类（不是数量，避免刷词）+ 句子数\n  let cc = 1;\n  if (st.distinctConnectors >= 4) cc = 4;\n  else if (st.distinctConnectors >= 3) cc = 3;\n  else if (st.distinctConnectors >= 2) cc = 2;\n  if (st.sentences >= 8) cc = Math.min(5, cc + 1);\n\n  // 词汇：TTR + 重复惩罚\n  let lr = 1;\n  if (st.ttr >= 0.55 && st.n >= 100) lr = 4;\n  else if (st.ttr >= 0.50) lr = 3;\n  else if (st.ttr >= 0.40) lr = 2;\n  if (st.repeatedContent.length >= 3) lr = Math.max(1, lr - 1);\n  if (st.n >= 200 && st.ttr >= 0.50) lr = Math.min(5, lr + 1);\n\n  // 语法：复杂句标记 + 平均句长（过短或过长都扣）\n  let gra = 1;\n  if (st.complex >= 6) gra = 4;\n  else if (st.complex >= 4) gra = 3;\n  else if (st.complex >= 2) gra = 2;\n  if (st.avg < 8 || st.avg > 35) gra = Math.max(1, gra - 1);\n  if (st.avg >= 12 && st.avg <= 22 && st.complex >= 3) gra = Math.min(5, gra + 1);\n\n  const avg = (task + cc + lr + gra) / 4;\n  let overall = toLevel(avg);\n\n  // 字数严重不足时综合 cap（雅思官方规则：字数不够直接限分）\n  if (st.n < minWords * 0.5) overall = 'L1';\n  else if (st.n < minWords * 0.85) {\n    // 中度不足，综合不能超过 L3\n    const order = ['L1','L2','L3','L4','L5'];\n    if (order.indexOf(overall) > 2) overall = 'L3';\n  }\n\n  // 诊断\n  const issues = [];\n  if (st.n < minWords) issues.push(`字数 ${st.n} / ${minWords}，不足会直接限分`);\n  if (st.distinctConnectors < 3) issues.push(`连接词种类只有 ${st.distinctConnectors}，需要 ≥3 种`);\n  if (st.repeatedContent.length >= 3) issues.push(`重复词偏多：${st.repeatedContent.slice(0,3).join(', ')}`);\n  if (st.complex < 3) issues.push('复杂句不足，从句标记 <3');\n  if (st.avg > 35) issues.push('句子过长，语法易失控');\n  if (st.avg < 8) issues.push('句子过短，缺乏复杂结构');\n  if (st.ttr < 0.40 && st.n > 80) issues.push('词汇重复度过高');\n\n  return {\n    overall,\n    overallLabel: LEVEL_LABEL[overall],\n    dims: {\n      task: toLevel(task),\n      coherence: toLevel(cc),\n      lexical: toLevel(lr),\n      grammar: toLevel(gra),\n    },\n    stats: st,\n    issues,\n  };\n}\n\n// 口语：砍掉发音维度。只评流利度、词汇、语法。\nexport function scoreSpeaking(text) {\n  const st = textStats(text);\n  let flu = 1;\n  if (st.n >= 200 && st.sentences >= 8) flu = 4;\n  else if (st.n >= 130) flu = 3;\n  else if (st.n >= 70) flu = 2;\n  if (st.distinctConnectors >= 2) flu = Math.min(5, flu + 1);\n\n  let lex = 1;\n  if (st.ttr >= 0.55) lex = 4;\n  else if (st.ttr >= 0.45) lex = 3;\n  else if (st.ttr >= 0.35) lex = 2;\n  if (st.repeatedContent.length >= 3) lex = Math.max(1, lex - 1);\n\n  let gram = 1;\n  if (st.complex >= 5) gram = 4;\n  else if (st.complex >= 3) gram = 3;\n  else if (st.complex >= 1) gram = 2;\n  if (st.avg < 6) gram = Math.max(1, gram - 1);\n\n  const overall = toLevel((flu + lex + gram) / 3);\n\n  const issues = [];\n  if (st.n < 100) issues.push('转写文本太短，无法判断流利度');\n  if (st.repeatedContent.length >= 3) issues.push(`口头禅或重复词：${st.repeatedContent.slice(0,3).join(', ')}`);\n  if (st.complex < 2) issues.push('从句少，结构单一');\n\n  return {\n    overall,\n    overallLabel: LEVEL_LABEL[overall],\n    dims: {\n      fluency: toLevel(flu),\n      lexical: toLevel(lex),\n      grammar: toLevel(gram),\n    },\n    stats: st,\n    issues,\n    note: '发音维度无法通过文本判断，已省略。请用录音自评或专业测评工具补充。',\n  };\n}\n\n// 听力 / 阅读原始分 → 仍然给 Band 是合理的，因为有官方对照表\n// 但显示为 \"估算 Band\"，不要让用户误以为是官方分\nexport function rawToBand(raw) {\n  const r = Number(raw) || 0;\n  if (r >= 39) return 9;\n  if (r >= 37) return 8.5;\n  if (r >= 35) return 8;\n  if (r >= 32) return 7.5;\n  if (r >= 30) return 7;\n  if (r >= 26) return 6.5;\n  if (r >= 23) return 6;\n  if (r >= 18) return 5.5;\n  if (r >= 16) return 5;\n  if (r >= 13) return 4.5;\n  if (r >= 10) return 4;\n  if (r >= 6) return 3.5;\n  return 3;\n}\n","srs.js":"// srs.js — spaced repetition with undo\nimport { state, mutate, addXP, todayDone, awardDailyOnce } from './state.js';\nimport { todayKey, addDaysLocal } from './utils.js';\nimport { toast } from './toast.js';\n\n// 内存中的 undo 栈，不持久化\nconst undoStack = [];\n\nexport function getWordState(words, w) {\n  return state.value.words[w.w] || { ease: 2.5, interval: 0, reps: 0, due: todayKey(), history: [] };\n}\n\nexport function dueWords(words) {\n  const t = todayKey();\n  return words.filter(w => {\n    const s = state.value.words[w.w];\n    return !s || s.due <= t;\n  });\n}\n\nexport function ensureQueue(words) {\n  const t = todayKey();\n  if (state.value.wordQueueDate === t) return;\n  const due = dueWords(words).map(w => w.w);\n  const unseen = words\n    .filter(w => !state.value.words[w.w] && !due.includes(w.w))\n    .map(w => w.w);\n  const queue = [...due, ...unseen].slice(0, 30);\n  mutate(s => {\n    s.wordQueue = queue;\n    s.wordQueueDate = t;\n  });\n}\n\nexport function currentWord(words) {\n  ensureQueue(words);\n  const target = state.value.wordQueue[0];\n  if (!target) return null;\n  return words.find(w => w.w === target) || null;\n}\n\nexport function scheduleWord(words, grade) {\n  const w = currentWord(words);\n  if (!w) return;\n\n  const prev = state.value.words[w.w] ? { ...state.value.words[w.w] } : null;\n  const prevQueueHead = w.w;\n\n  const cur = prev || { ease: 2.5, interval: 0, reps: 0, due: todayKey(), history: [] };\n  const s = { ...cur };\n  let interval;\n  if (grade === 'know') {\n    s.reps++;\n    s.ease = Math.min(3.0, s.ease + 0.12);\n    interval = s.reps === 1 ? 1 : s.reps === 2 ? 3 : Math.max(1, Math.round((s.interval || 1) * s.ease));\n  } else if (grade === 'fuzzy') {\n    s.reps = Math.max(1, s.reps);\n    s.ease = Math.max(1.5, s.ease - 0.15);\n    interval = s.reps <= 1 ? 1 : 3;\n  } else { // forget\n    s.reps = 0;\n    s.ease = Math.max(1.3, s.ease - 0.35);\n    interval = 1;\n  }\n  s.interval = interval;\n  s.due = addDaysLocal(interval);\n  s.history = [...(s.history || []), { date: todayKey(), grade }];\n\n  // 推入 undo 栈\n  undoStack.push({ word: w.w, prev, prevQueueHead });\n  if (undoStack.length > 20) undoStack.shift();\n\n  mutate(st => {\n    st.words[w.w] = s;\n    st.wordQueue.shift();\n  });\n\n  // 今日做满 10 个标记完成\n  const todayHist = Object.values(state.value.words)\n    .flatMap(x => (x.history || []).filter(h => h.date === todayKey())).length;\n  if (todayHist >= 10) {\n    mutate(st => {\n      const t = todayKey();\n      if (!st.done[t]) st.done[t] = { vocab: false, listening: [], reading: [], writing: false, speaking: false, mock: false };\n      st.done[t].vocab = true;\n    });\n    awardDailyOnce('vocab', 30);\n  }\n\n  addXP(grade === 'know' ? 12 : grade === 'fuzzy' ? 8 : 5);\n}\n\nexport function canUndo() {\n  return undoStack.length > 0;\n}\n\nexport function undoLast() {\n  const last = undoStack.pop();\n  if (!last) { toast('没有可撤销的操作'); return; }\n  mutate(s => {\n    if (last.prev) s.words[last.word] = last.prev;\n    else delete s.words[last.word];\n    s.wordQueue.unshift(last.prevQueueHead);\n  });\n  toast('已撤销上一次评分');\n}\n\nexport function forceResetQueue() {\n  mutate(s => { s.wordQueueDate = null; });\n}\n\nexport function masteredCount(words) {\n  return Object.values(state.value.words).filter(x => (x.reps || 0) >= 3 && (x.interval || 0) >= 7).length;\n}\n","state.js":"// state.js — single source of truth, with schema versioning\nimport { signal, effect } from 'https://esm.sh/@preact/signals@1.3.0?external=preact';\nimport { todayKey, dayDiff } from './utils.js';\n\nconst STORAGE_KEY = 'ieltsQuestOS_v3';\nconst LEGACY_KEYS = ['ieltsQuestOS_v2', 'ieltsQuestOS'];\nconst SCHEMA_VERSION = 3;\n\nfunction defaultState() {\n  return {\n    schemaVersion: SCHEMA_VERSION,\n    xp: 0,\n    level: 1,\n    streak: 0,\n    lastActive: null,\n    view: 'home',\n    // 词汇 SRS\n    words: {},          // {word: {ease, interval, reps, due, history:[]}}\n    wordQueue: [],\n    wordQueueDate: null,\n    // 输入框持久化（按 date 分桶，避免无限增长）\n    inputs: {},         // {date: {fieldId: value}}\n    // 写作草稿\n    writing: {},        // {date: text}\n    // 每日完成状态\n    done: {},           // {date: {vocab, listening:[i], reading:[i], writing, speaking, mock}}\n    // 防止 XP 重复领取\n    awards: {},\n    // 模考历史\n    mockHistory: [],\n    // SRS undo 栈（仅在内存，不持久化）\n    // _undoStack: []  ← 写在 module scope，不进 state\n  };\n}\n\n// 迁移：从 v1 / v2 升到 v3\nfunction migrate(raw) {\n  if (!raw || typeof raw !== 'object') return defaultState();\n  const v = raw.schemaVersion || 0;\n  if (v === SCHEMA_VERSION) return raw;\n\n  // v0/v1/v2 → v3\n  const base = defaultState();\n  return {\n    ...base,\n    ...raw,\n    schemaVersion: SCHEMA_VERSION,\n    // 新增字段补默认\n    inputs: raw.inputs || {},\n    mockHistory: raw.mockHistory || [],\n    // 老的 boss 字段直接抛弃（功能砍了）\n  };\n}\n\nfunction load() {\n  try {\n    const raw = localStorage.getItem(STORAGE_KEY);\n    if (raw) return migrate(JSON.parse(raw));\n    // 尝试从老 key 迁移\n    for (const k of LEGACY_KEYS) {\n      const old = localStorage.getItem(k);\n      if (old) {\n        const migrated = migrate(JSON.parse(old));\n        // 保留老数据，新 key 写入\n        return migrated;\n      }\n    }\n  } catch (e) {\n    console.warn('state load failed, using default', e);\n  }\n  return defaultState();\n}\n\n// 单一 signal，整棵 state 树\nexport const state = signal(load());\n\n// 自动持久化（用 effect 监听 state.value 变化，debounce 500ms）\nlet saveTimer = null;\neffect(() => {\n  // 触发依赖\n  const _ = state.value;\n  clearTimeout(saveTimer);\n  saveTimer = setTimeout(() => {\n    try {\n      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.value));\n    } catch (e) {\n      console.warn('state save failed', e);\n    }\n  }, 500);\n});\n\n// 不可变更新辅助：mutate(s => { s.xp += 10 })\n// 用深拷贝保证 signal 触发\nconst deepClone = (typeof structuredClone === 'function')\n  ? structuredClone\n  : (v) => JSON.parse(JSON.stringify(v));\n\nexport function mutate(fn) {\n  const next = deepClone(state.value);\n  fn(next);\n  state.value = next;\n}\n\n// 立即写入（用于 import / reset / 关键节点）\nexport function flushSave() {\n  clearTimeout(saveTimer);\n  try {\n    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.value));\n  } catch (e) {}\n}\n\n// 重置\nexport function resetAll() {\n  localStorage.removeItem(STORAGE_KEY);\n  for (const k of LEGACY_KEYS) localStorage.removeItem(k);\n  state.value = defaultState();\n}\n\n// 导入：替换整棵树\nexport function importState(raw) {\n  state.value = migrate(raw);\n  flushSave();\n}\n\n// XP / 等级\nexport function addXP(n) {\n  mutate(s => {\n    s.xp = Math.max(0, s.xp + n);\n    s.level = Math.floor(s.xp / 500) + 1;\n    markActiveInner(s);\n  });\n}\n\nfunction markActiveInner(s) {\n  const t = todayKey();\n  if (s.lastActive === t) return;\n  if (s.lastActive) {\n    const diff = dayDiff(s.lastActive, t);\n    if (diff === 1) s.streak += 1;\n    else if (diff > 1) s.streak = 1;\n    // diff <= 0 不动（极端情况：跨时区回拨）\n  } else {\n    s.streak = 1;\n  }\n  s.lastActive = t;\n}\n\nexport function markActive() {\n  mutate(markActiveInner);\n}\n\n// 今日完成桶\nexport function todayDone() {\n  const t = todayKey();\n  const d = state.value.done[t];\n  if (d) return d;\n  // 懒初始化\n  mutate(s => {\n    s.done[t] = { vocab: false, listening: [], reading: [], writing: false, speaking: false, mock: false };\n  });\n  return state.value.done[t];\n}\n\n// 每日 XP 防刷\nexport function awardDailyOnce(name, xp) {\n  const key = `${todayKey()}_${name}`;\n  if (state.value.awards[key]) return false;\n  mutate(s => { s.awards[key] = true; });\n  addXP(xp);\n  return true;\n}\n\n// 输入框持久化\nexport function getInput(fieldId, date = todayKey()) {\n  return state.value.inputs[date]?.[fieldId] || '';\n}\n\nexport function setInput(fieldId, value, date = todayKey()) {\n  mutate(s => {\n    if (!s.inputs[date]) s.inputs[date] = {};\n    s.inputs[date][fieldId] = value;\n  });\n}\n\n// 清理太老的 input 桶（>30天），避免 localStorage 膨胀\nexport function pruneOldInputs() {\n  mutate(s => {\n    const t = todayKey();\n    for (const date of Object.keys(s.inputs)) {\n      if (dayDiff(date, t) > 30) delete s.inputs[date];\n    }\n  });\n}\n","timer.js":"// timer.js — single shared countdown, exposed as a signal\nimport { signal } from 'https://esm.sh/@preact/signals@1.3.0?external=preact';\nimport { toast } from './toast.js';\n\nexport const timer = signal({ seconds: 0, running: false, label: '' });\n\nlet intervalId = null;\n\nexport function startTimer(sec, label = '') {\n  stopTimer();\n  timer.value = { seconds: sec, running: true, label };\n  intervalId = setInterval(() => {\n    const t = timer.value;\n    if (t.seconds <= 0) {\n      stopTimer();\n      timer.value = { seconds: 0, running: false, label };\n      toast('时间到，停止输入，开始复盘');\n      return;\n    }\n    timer.value = { ...t, seconds: t.seconds - 1 };\n  }, 1000);\n}\n\nexport function stopTimer() {\n  if (intervalId) { clearInterval(intervalId); intervalId = null; }\n  if (timer.value.running) {\n    timer.value = { ...timer.value, running: false };\n  }\n}\n\nexport function fmtTimer(s) {\n  const m = String(Math.floor(s / 60)).padStart(2, '0');\n  const ss = String(s % 60).padStart(2, '0');\n  return `${m}:${ss}`;\n}\n","toast.js":"// toast.js — single transient notification, queued\nlet current = null;\n\nexport function toast(msg, ms = 1500) {\n  if (current) current.remove();\n  const d = document.createElement('div');\n  d.className = 'toast';\n  d.textContent = msg;\n  d.setAttribute('role', 'status');\n  document.body.appendChild(d);\n  current = d;\n  setTimeout(() => {\n    if (d === current) {\n      d.remove();\n      current = null;\n    } else {\n      d.remove();\n    }\n  }, ms);\n}\n","tts.js":"// tts.js — speech synthesis with iOS unlock, voice ranking, smart keep-alive\nimport { signal } from 'https://esm.sh/@preact/signals@1.3.0?external=preact';\nimport { clamp } from './utils.js';\nimport { toast } from './toast.js';\n\nexport const ttsState = signal({\n  rate: 1.0,\n  wordRate: 0.95,\n  accent: 'GB',\n  voiceName: '加载中…',\n  ready: false,\n});\n\nlet voice = null;\nlet unlocked = false;\nlet keepAlive = null;\n\nconst HQ_NAMES = [\n  'Samantha', 'Daniel', 'Karen', 'Moira', 'Tessa', 'Serena', 'Kate', 'Oliver', 'Aaron',\n  'Google UK English Female', 'Google UK English Male', 'Google US English',\n  'Aria', 'Jenny', 'Guy', 'Sonia', 'Ryan', 'Libby',\n  'Natural', 'Neural', 'Premium', 'Enhanced',\n];\n\nfunction scoreVoice(v, accent) {\n  let s = 0;\n  const name = v.name || '';\n  const lang = (v.lang || '').toLowerCase();\n  if (accent === 'GB' && /en-gb/.test(lang)) s += 40;\n  else if (accent === 'US' && /en-us/.test(lang)) s += 40;\n  else if (/^en[-_]/.test(lang)) s += 25;\n  else if (/^en$/.test(lang)) s += 10;\n  if (v.localService) s += 8;\n  for (const k of HQ_NAMES) {\n    if (name.toLowerCase().includes(k.toLowerCase())) { s += 20; break; }\n  }\n  if (/eSpeak|compact|novelty/i.test(name)) s -= 30;\n  return s;\n}\n\nfunction pickVoice() {\n  if (!('speechSynthesis' in window)) return;\n  const voices = speechSynthesis.getVoices() || [];\n  if (!voices.length) return;\n  const ranked = voices\n    .map(v => ({ v, s: scoreVoice(v, ttsState.value.accent) }))\n    .sort((a, b) => b.s - a.s);\n  voice = ranked[0].v;\n  ttsState.value = { ...ttsState.value, voiceName: voice.name || '未知', ready: true };\n}\n\nexport function initTTS() {\n  if (!('speechSynthesis' in window)) return;\n  pickVoice();\n  speechSynthesis.onvoiceschanged = pickVoice;\n  let tries = 0;\n  const poll = setInterval(() => {\n    if (ttsState.value.ready || tries++ > 10) return clearInterval(poll);\n    pickVoice();\n  }, 250);\n\n  // 首次用户手势解锁\n  const unlock = () => {\n    if (unlocked) return;\n    try {\n      const u = new SpeechSynthesisUtterance('');\n      u.volume = 0;\n      speechSynthesis.speak(u);\n      unlocked = true;\n    } catch (e) {}\n  };\n  document.addEventListener('click', unlock, { capture: true });\n  document.addEventListener('touchstart', unlock, { capture: true });\n}\n\n// 仅 Chrome 桌面端启用 keep-alive。iOS Safari 上 pause/resume 会破坏播放。\nconst isChromeDesktop = (() => {\n  const ua = navigator.userAgent;\n  return /Chrome/.test(ua) && !/Mobile|Android|iPhone|iPad/.test(ua) && !/Edg/.test(ua);\n})();\n\nfunction startKeepAlive() {\n  if (!isChromeDesktop) return;\n  stopKeepAlive();\n  keepAlive = setInterval(() => {\n    if (!('speechSynthesis' in window)) return;\n    if (speechSynthesis.speaking && !speechSynthesis.paused) {\n      speechSynthesis.pause();\n      speechSynthesis.resume();\n    }\n  }, 10000);\n}\n\nfunction stopKeepAlive() {\n  if (keepAlive) { clearInterval(keepAlive); keepAlive = null; }\n}\n\nfunction chunkText(text) {\n  const parts = String(text)\n    .replace(/\\s+/g, ' ')\n    .trim()\n    .match(/[^.!?。！？]+[.!?。！？]?/g) || [text];\n  const out = [];\n  for (const p of parts) {\n    if (p.length <= 180) { out.push(p.trim()); continue; }\n    const sub = p.split(/([,;:，；：])/);\n    let cur = '';\n    for (const s of sub) {\n      if ((cur + s).length > 160 && cur) { out.push(cur.trim()); cur = s; }\n      else cur += s;\n    }\n    if (cur.trim()) out.push(cur.trim());\n  }\n  return out.filter(Boolean);\n}\n\nexport function speak(text, opts = {}) {\n  if (!('speechSynthesis' in window)) { toast('当前浏览器不支持语音'); return; }\n  if (!text) return;\n  const rate = clamp(opts.rate ?? ttsState.value.rate, 0.5, 1.6);\n  const pitch = opts.pitch ?? 1.0;\n  const volume = opts.volume ?? 1.0;\n\n  try { speechSynthesis.cancel(); } catch (e) {}\n\n  const chunks = chunkText(text);\n  setTimeout(() => {\n    if (!voice) pickVoice();\n    chunks.forEach((chunk, i) => {\n      const u = new SpeechSynthesisUtterance(chunk);\n      if (voice) u.voice = voice;\n      u.lang = (voice && voice.lang) || (ttsState.value.accent === 'GB' ? 'en-GB' : 'en-US');\n      u.rate = rate;\n      u.pitch = pitch;\n      u.volume = volume;\n      if (i === 0) u.onstart = startKeepAlive;\n      if (i === chunks.length - 1) u.onend = stopKeepAlive;\n      u.onerror = stopKeepAlive;\n      speechSynthesis.speak(u);\n    });\n  }, 80);\n}\n\nexport function stopSpeak() {\n  if (!('speechSynthesis' in window)) return;\n  try { speechSynthesis.cancel(); } catch (e) {}\n  stopKeepAlive();\n}\n\nexport function setRate(r) {\n  ttsState.value = { ...ttsState.value, rate: clamp(r, 0.5, 1.6) };\n}\n\nexport function setAccent(a) {\n  ttsState.value = { ...ttsState.value, accent: a };\n  pickVoice();\n  toast('口音切换为 ' + (a === 'GB' ? '英音' : '美音'));\n}\n","utils.js":"// utils.js — pure helpers, no DOM, no state\n\n// 真本地日期，零时区歧义（不依赖 ISO/UTC 转换）\nexport function todayKey(date = new Date()) {\n  const y = date.getFullYear();\n  const m = String(date.getMonth() + 1).padStart(2, '0');\n  const d = String(date.getDate()).padStart(2, '0');\n  return `${y}-${m}-${d}`;\n}\n\nexport function addDaysLocal(days) {\n  const d = new Date();\n  d.setHours(12, 0, 0, 0); // 正午锚点，避免 DST 越界\n  d.setDate(d.getDate() + days);\n  return todayKey(d);\n}\n\n// 两个 YYYY-MM-DD 字符串之间的天数差，不依赖 Date 算术\nexport function dayDiff(a, b) {\n  const [ay, am, ad] = a.split('-').map(Number);\n  const [by, bm, bd] = b.split('-').map(Number);\n  const da = Date.UTC(ay, am - 1, ad);\n  const db = Date.UTC(by, bm - 1, bd);\n  return Math.round((db - da) / 86400000);\n}\n\n// 修复版词数统计：先把缩略词 / 连字符词当一个 token\n// don't, state-of-the-art, well-known 都算 1 个\nexport function wordCountOf(text) {\n  if (!text) return 0;\n  return (String(text).match(/[A-Za-z]+(?:[-'][A-Za-z]+)*/g) || []).length;\n}\n\nexport function clamp(n, lo, hi) {\n  return Math.min(hi, Math.max(lo, n));\n}\n\nexport function debounce(fn, ms = 300) {\n  let t = null;\n  return (...args) => {\n    clearTimeout(t);\n    t = setTimeout(() => fn(...args), ms);\n  };\n}\n\n// 用户回答 vs 标准答案：去冠词、标点、空格归一\n// 不再做\"包含即对\" → 必须等价或仅差末尾标点\nexport function normAns(s) {\n  return String(s || '')\n    .toLowerCase()\n    .trim()\n    .replace(/\\b(a|an|the)\\b/g, '')\n    .replace(/[^a-z0-9: ]/g, ' ')\n    .replace(/\\s+/g, ' ')\n    .trim();\n}\n\n// 严格相等 + 数字归一（\"620\" === \"620 pounds\" 这种由用户带单位的情况可接受）\nexport function sameAns(user, answer) {\n  const u = normAns(user);\n  const a = normAns(answer);\n  if (!u) return false;\n  if (u === a) return true;\n  // 数字 / 时间：允许带或不带单位（\"15 september\" === \"15 september\"）\n  // 但绝不允许 \"transport\" === \"local transport\" 这种部分匹配\n  // 例外：纯数字答案，用户输了带词形也算（\"620\" vs \"620 pounds\"）\n  if (/^\\d+(:\\d+)?$/.test(a) && u.split(' ').includes(a)) return true;\n  return false;\n}\n\nexport function uid() {\n  return Math.random().toString(36).slice(2, 10);\n}\n","views/home.js":"// views/home.js\nimport { html } from 'https://esm.sh/htm@3.1.1/preact?external=preact';\nimport { state } from '../state.js';\nimport { dueWords, masteredCount } from '../srs.js';\nimport { todayKey } from '../utils.js';\n\nexport function Home({ words, nav }) {\n  const s = state.value;\n  const due = dueWords(words).length;\n  const mastered = masteredCount(words);\n  const xpInLevel = s.xp % 500;\n  const xpPct = xpInLevel / 5;\n  const todayK = todayKey();\n  const todayBucket = s.done[todayK] || { vocab:false, listening:[], reading:[], writing:false, speaking:false, mock:false };\n\n  const tasks = [\n    { key:'vocab',     label:'词汇循环（≥10 词）',   done: todayBucket.vocab,           view:'vocab' },\n    { key:'listening', label:'听力精听 1 段',         done: todayBucket.listening.length>0, view:'listening' },\n    { key:'reading',   label:'阅读精读 1 篇',         done: todayBucket.reading.length>0,   view:'reading' },\n    { key:'writing',   label:'写作输出 1 项',         done: todayBucket.writing,         view:'writing' },\n    { key:'speaking',  label:'口语开口 1 次',         done: todayBucket.speaking,        view:'speaking' },\n  ];\n  const doneCount = tasks.filter(x => x.done).length;\n  const todayPct = Math.round(doneCount / tasks.length * 100);\n\n  const tiles = [\n    { view:'vocab',     icon:'📖', title:'单词系统',  desc:'认识 / 模糊 / 忘记；间隔复习',     done: todayBucket.vocab },\n    { view:'listening', icon:'🎧', title:'听力精听',  desc:'可播放文本，Section 1–4 训练',     done: todayBucket.listening.length>0 },\n    { view:'reading',   icon:'📄', title:'阅读题型',  desc:'T/F/NG、标题匹配、填空',           done: todayBucket.reading.length>0 },\n    { view:'writing',   icon:'✍️', title:'写作竞技场', desc:'在线编辑 + 计时 + 历史草稿',       done: todayBucket.writing },\n    { view:'speaking',  icon:'🎙️', title:'口语训练',  desc:'Part 1/2/3 计时输出',              done: todayBucket.speaking },\n    { view:'mock',      icon:'🧪', title:'完整模考',  desc:'听读自动判分，写口启发式估算',     done: todayBucket.mock },\n    { view:'theory',    icon:'🧠', title:'理论 & 关于',desc:'设计依据 / 数据安全',              done: false },\n  ];\n\n  return html`\n    <section class=\"card\">\n      <div class=\"stat\">\n        <span class=\"pill\"><span class=\"k\">Lv.</span>${s.level}</span>\n        <span class=\"pill\"><span class=\"k\">XP</span>${s.xp}</span>\n        <span class=\"pill\"><span class=\"k\">连续</span>${s.streak} 天</span>\n        <span class=\"pill\"><span class=\"k\">今日待复习</span>${due} 词</span>\n        <span class=\"pill\"><span class=\"k\">词库掌握</span>${mastered}/${words.length}</span>\n      </div>\n      <div class=\"progress\" title=${`距离下一级 ${500 - xpInLevel} XP`}>\n        <div class=\"bar\" style=${`width:${xpPct}%`}></div>\n      </div>\n    </section>\n\n    <section class=\"card\">\n      <div class=\"row\" style=\"justify-content:space-between\">\n        <h2 style=\"margin:0\">今日任务</h2>\n        <span class=\"badge\">${doneCount}/${tasks.length} · ${todayPct}%</span>\n      </div>\n      <div class=\"checklist\" style=\"margin-top:8px\">\n        ${tasks.map(t => html`\n          <label key=${t.key} onClick=${() => nav(t.view)} style=\"cursor:pointer\">\n            <input type=\"checkbox\" checked=${t.done} disabled />\n            <span style=${t.done ? 'color:#bbf7d0;text-decoration:line-through' : ''}>${t.label}</span>\n          </label>\n        `)}\n      </div>\n      <p class=\"muted\" style=\"margin-top:6px\">最低有效剂量：10 词 + 1 段听力 + 1 个输出任务。不要追求全做，追求不断线。</p>\n    </section>\n\n    <div class=\"grid\">\n      ${tiles.map(t => html`\n        <button key=${t.view} class=\"module\" onClick=${() => nav(t.view)}>\n          <h2><span class=\"ic\">${t.icon}</span>${t.title}</h2>\n          <p>${t.desc}</p>\n          ${t.done ? html`<span class=\"done-mark\">✓ 今日已完成</span>` : null}\n        </button>\n      `)}\n    </div>\n  `;\n}\n","views/listening.js":"// views/listening.js\nimport { html } from 'https://esm.sh/htm@3.1.1/preact?external=preact';\nimport { useState } from 'https://esm.sh/preact@10.19.6/hooks';\nimport { state, mutate, awardDailyOnce, todayDone } from '../state.js';\nimport { ttsState, setRate, setAccent, speak, stopSpeak } from '../tts.js';\nimport { todayKey } from '../utils.js';\nimport { PTextarea } from '../components/PersistentInput.js';\nimport { toast } from '../toast.js';\n\nexport function Listening({ items }) {\n  const tts = ttsState.value;\n  const todayK = todayKey();\n  const todayBucket = state.value.done[todayK] || { listening: [] };\n  const [showTr, setShowTr] = useState({});\n\n  function complete(i) {\n    if (todayBucket.listening.includes(i)) { toast('今日此段已完成'); return; }\n    mutate(s => {\n      if (!s.done[todayK]) s.done[todayK] = { vocab:false, listening:[], reading:[], writing:false, speaking:false, mock:false };\n      if (!s.done[todayK].listening.includes(i)) s.done[todayK].listening.push(i);\n    });\n    awardDailyOnce('listening_' + i, 60);\n  }\n\n  return html`\n    <section class=\"card\">\n      <h2>听力精听</h2>\n      <p class=\"muted\">⚠️ 浏览器 TTS 仅辅助练习语流与词汇。冲分阶段务必配合剑桥真题音频。</p>\n      <div class=\"row\" style=\"margin-top:8px\">\n        <span class=\"badge\">速度</span>\n        ${[0.7, 0.85, 1.0, 1.15, 1.3].map(v => html`\n          <button key=${v} class=${'ghost small ' + (v === tts.rate ? 'active' : '')} onClick=${() => setRate(v)}>${v.toFixed(2)}x</button>\n        `)}\n      </div>\n      <div class=\"row\" style=\"margin-top:6px\">\n        <span class=\"badge\">口音</span>\n        <button class=${'ghost small ' + (tts.accent === 'GB' ? 'active' : '')} onClick=${() => setAccent('GB')}>英音 GB</button>\n        <button class=${'ghost small ' + (tts.accent === 'US' ? 'active' : '')} onClick=${() => setAccent('US')}>美音 US</button>\n        <span class=\"badge\">${tts.voiceName}</span>\n      </div>\n    </section>\n\n    <div class=\"stack\">\n      ${items.map((x, i) => {\n        const done = todayBucket.listening.includes(i);\n        const open = showTr[i];\n        return html`\n          <section class=\"card\" key=${i}>\n            <div class=\"tag-row\">\n              <span class=\"badge\">${x.level}</span>\n              <span class=\"badge\">精听 ${i + 1}</span>\n              ${done ? html`<span class=\"badge\" style=\"color:#bbf7d0;border-color:#22c55e\">✓ 今日已完成</span>` : null}\n            </div>\n            <h2>${x.title}</h2>\n            <p class=\"muted\">先听，不要急着看文本。第二遍再听写。</p>\n            <div class=\"row\">\n              <button class=\"btn\" onClick=${() => speak(x.text)}>▶ 播放</button>\n              <button class=\"btn secondary\" onClick=${() => speak(x.text, { rate: 0.75 })}>🐢 0.75x</button>\n              <button class=\"btn secondary\" onClick=${() => setShowTr({ ...showTr, [i]: !open })}>${open ? '隐藏' : '显示'}文本</button>\n              <button class=\"btn secondary\" onClick=${() => stopSpeak()}>⏹ 停止</button>\n            </div>\n            ${open ? html`<div class=\"quote\" style=\"margin-top:10px\">${x.text}</div>` : null}\n            <${PTextarea}\n              fieldId=${`listening_${i}_dictation`}\n              placeholder=\"听写区：听到什么写什么。\"\n              style=\"margin-top:10px\"\n              date=${todayK}\n            />\n            <div class=\"checklist\">\n              ${x.tasks.map((t, ti) => html`<label key=${ti}><input type=\"checkbox\" />${t}</label>`)}\n            </div>\n            <h3>检查题</h3>\n            ${x.qs.map((q, qi) => html`<p class=\"muted\" key=${qi}>• ${q}</p>`)}\n            <button class=\"btn ok\" disabled=${done} onClick=${() => complete(i)}>\n              ${done ? '今日已完成' : '完成本段 +60 XP'}\n            </button>\n          </section>\n        `;\n      })}\n    </div>\n  `;\n}\n","views/mock.js":"// views/mock.js\nimport { html } from 'https://esm.sh/htm@3.1.1/preact?external=preact';\nimport { useState } from 'https://esm.sh/preact@10.19.6/hooks';\nimport { state, mutate, awardDailyOnce } from '../state.js';\nimport { todayKey, sameAns } from '../utils.js';\nimport { startTimer, stopTimer, timer, fmtTimer } from '../timer.js';\nimport { speak } from '../tts.js';\nimport { scoreWriting, scoreSpeaking, rawToBand } from '../scoring.js';\nimport { PInput, PTextarea, readPersisted } from '../components/PersistentInput.js';\nimport { toast } from '../toast.js';\n\nexport function Mock({ data }) {\n  const todayK = todayKey();\n  const [result, setResult] = useState(null);\n  const t = timer.value;\n  const hist = (state.value.mockHistory || []).slice().reverse().slice(0, 5);\n\n  function submit() {\n    // 等 PInput/PTextarea 的 debounce(200ms) 都写入再读\n    setTimeout(() => doSubmit(), 250);\n  }\n\n  function doSubmit() {\n    let lRaw = 0, rRaw = 0;\n    const wrongL = [], wrongR = [];\n\n    data.listening.flatMap(s => s.qs).forEach((q, i) => {\n      const no = i + 1;\n      const ans = readPersisted(`mock_l_${no}`, todayK);\n      if (sameAns(ans, q[1])) lRaw++;\n      else wrongL.push(no);\n    });\n\n    data.reading.flatMap(s => s.qs).forEach((q, i) => {\n      const no = i + 1;\n      const ans = readPersisted(`mock_r_${no}`, todayK);\n      if (sameAns(ans, q[1])) rRaw++;\n      else wrongR.push(no);\n    });\n\n    const w1Text = readPersisted('mock_w1', todayK);\n    const w2Text = readPersisted('mock_w2', todayK);\n    const spText = readPersisted('mock_speaking', todayK);\n\n    const w1 = scoreWriting(w1Text, 'task1');\n    const w2 = scoreWriting(w2Text, 'task2');\n    const sp = scoreSpeaking(spText);\n\n    const lBand = rawToBand(lRaw);\n    const rBand = rawToBand(rRaw);\n\n    const advice = [];\n    if (lRaw < 30) advice.push('听力：先补 Section 1/2 准确率，别急着刷难题。');\n    if (rRaw < 30) advice.push('阅读：错题按题型归因，尤其 T/F/NG 和填空定位。');\n    if (['L1','L2'].includes(w2.overall)) advice.push('写作 Task 2：先解决字数、连接词种类、复杂句稳定性。');\n    if (['L1','L2'].includes(sp.overall)) advice.push('口语：每天 10 分钟录音复述，减少停顿和碎片句。');\n\n    const summary = {\n      date: todayK,\n      lRaw, rRaw, lBand, rBand,\n      wLevel: w2.overall, // 用 Task 2 综合等级代表\n      sLevel: sp.overall,\n      wDims: w2.dims,\n      sDims: sp.dims,\n      w1Level: w1.overall,\n      w2Level: w2.overall,\n    };\n\n    mutate(s => {\n      s.mockHistory = s.mockHistory || [];\n      s.mockHistory.push(summary);\n      if (!s.done[todayK]) s.done[todayK] = { vocab:false, listening:[], reading:[], writing:false, speaking:false, mock:false };\n      s.done[todayK].mock = true;\n    });\n    awardDailyOnce('mock', 200);\n\n    setResult({ summary, wrongL, wrongR, w1, w2, sp, advice });\n\n    setTimeout(() => {\n      const el = document.getElementById('mockResult');\n      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }, 100);\n  }\n\n  return html`\n    <section class=\"card\">\n      <h2>完整 IELTS 模考</h2>\n      <p class=\"muted\">流程按 IELTS 四科设计：Listening 40 题、Reading 40 题、Writing Task 1/2、Speaking Part 1/2/3。</p>\n      <p class=\"warnText\">⚠️ 听力/阅读用题号精确匹配自动判分。写作/口语用启发式估算（L1–L5 等级），<b>不等于</b>官方 Band 分。</p>\n      <div class=\"row\">\n        <button class=\"btn\" onClick=${() => startTimer(1800, 'mock_l')}>听力 30 分钟</button>\n        <button class=\"btn\" onClick=${() => startTimer(3600, 'mock_r')}>阅读 60 分钟</button>\n        <button class=\"btn\" onClick=${() => startTimer(3600, 'mock_w')}>写作 60 分钟</button>\n        <button class=\"btn secondary\" onClick=${() => stopTimer()}>暂停</button>\n        <span class=${`timer ${t.running ? 'running' : ''}`}>${fmtTimer(t.seconds)}</span>\n      </div>\n    </section>\n\n    <section class=\"card\">\n      <h2>Listening · 40 Questions</h2>\n      <p class=\"muted\">每个 Section 先播放，再答题。真实备考请替换为剑桥真题音频。</p>\n      ${(() => {\n        let counter = 0;\n        return data.listening.map((sec, si) => html`\n          <details key=${si} open=${si === 0}>\n            <summary>${sec.section}</summary>\n            <div class=\"row\" style=\"margin-top:8px\"><button class=\"btn secondary\" onClick=${() => speak(sec.audio)}>▶ 播放本段</button></div>\n            <div class=\"quote\">${sec.audio}</div>\n            ${sec.qs.map((q, qi) => {\n              const no = ++counter;\n              return html`\n                <div class=\"q-card\" key=${qi}>\n                  <b>${no}. ${q[0]}</b>\n                  <${PInput} fieldId=${`mock_l_${no}`} placeholder=${`Answer ${no}`} date=${todayK} />\n                </div>\n              `;\n            })}\n          </details>\n        `);\n      })()}\n    </section>\n\n    <section class=\"card\">\n      <h2>Reading · 40 Questions</h2>\n      ${(() => {\n        let counter = 0;\n        return data.reading.map((pa, pi) => html`\n          <details key=${pi} open=${pi === 0}>\n            <summary>${pa.title}</summary>\n            <div class=\"quote\">${pa.text}</div>\n            ${pa.qs.map((q, qi) => {\n              const no = ++counter;\n              return html`\n                <div class=\"q-card\" key=${qi}>\n                  <b>${no}. ${q[0]}</b>\n                  <${PInput} fieldId=${`mock_r_${no}`} placeholder=\"True / False / Not Given 或填空\" date=${todayK} />\n                </div>\n              `;\n            })}\n          </details>\n        `);\n      })()}\n    </section>\n\n    <section class=\"card\">\n      <h2>Writing · Task 1 + Task 2</h2>\n      <div class=\"q-card\">\n        <b>Task 1</b>\n        <div class=\"quote\">${data.writingTask1}</div>\n        <${PTextarea} fieldId=\"mock_w1\" placeholder=\"Task 1 answer, at least 150 words\" date=${todayK} />\n      </div>\n      <div class=\"q-card\">\n        <b>Task 2</b>\n        <div class=\"quote\">${data.writingTask2}</div>\n        <${PTextarea} fieldId=\"mock_w2\" placeholder=\"Task 2 answer, at least 250 words\" date=${todayK} />\n      </div>\n    </section>\n\n    <section class=\"card\">\n      <h2>Speaking · Part 1 / 2 / 3</h2>\n      <p class=\"muted\">先用手机录音，再把自己的回答转写到下方。</p>\n      <h3>Part 1</h3>\n      ${data.speaking.part1.map((q, i) => html`<div class=\"quote\" key=${i}>${q}</div>`)}\n      <h3>Part 2</h3>\n      <div class=\"quote\">${data.speaking.part2}</div>\n      <h3>Part 3</h3>\n      ${data.speaking.part3.map((q, i) => html`<div class=\"quote\" key=${i}>${q}</div>`)}\n      <${PTextarea} fieldId=\"mock_speaking\" placeholder=\"把口语回答转写到这里。\" date=${todayK} />\n    </section>\n\n    <section class=\"card\">\n      <button class=\"btn bad\" onClick=${submit}>提交模考并自动打分</button>\n      <div id=\"mockResult\" style=\"margin-top:12px\">\n        ${result ? html`\n          <div class=\"q-card\">\n            <p class=\"warnText\">⚠️ 听力/阅读 Band 估算来自官方对照；写作/口语为<b>启发式等级</b>（L1–L5），不等于真实 Band。</p>\n            <h2>本次模考结果</h2>\n            <div class=\"stat\">\n              <span class=\"pill\"><span class=\"k\">Listening</span>${result.summary.lRaw}/40 · Band ${result.summary.lBand}</span>\n              <span class=\"pill\"><span class=\"k\">Reading</span>${result.summary.rRaw}/40 · Band ${result.summary.rBand}</span>\n              <span class=\"pill\"><span class=\"k\">Writing</span>${result.summary.wLevel}</span>\n              <span class=\"pill\"><span class=\"k\">Speaking</span>${result.summary.sLevel}</span>\n            </div>\n            <h3>写作细分</h3>\n            <p class=\"muted\">Task 1: ${result.w1.overall} · Task 2: ${result.w2.overall}</p>\n            ${result.w2.issues.length ? html`<p class=\"muted\">Task 2 问题：${result.w2.issues.slice(0,3).join('；')}</p>` : null}\n            <h3>口语细分</h3>\n            <p class=\"muted\">Fluency ${result.sp.dims.fluency} · Lexical ${result.sp.dims.lexical} · Grammar ${result.sp.dims.grammar}</p>\n            <h3>错题</h3>\n            <p class=\"muted\">Listening: ${result.wrongL.length ? result.wrongL.join(', ') : '无'}</p>\n            <p class=\"muted\">Reading: ${result.wrongR.length ? result.wrongR.join(', ') : '无'}</p>\n            <h3>下一步</h3>\n            ${result.advice.length ?\n              result.advice.map((x, i) => html`<p class=\"muted\" key=${i}>• ${x}</p>`) :\n              html`<p class=\"muted\">• 分数不错，但必须用剑桥真题做二次验证。</p>`\n            }\n            <p class=\"danger\">严肃提醒：写作/口语是规则估算，不是官方评分。真正冲分必须用真人批改或高质量语音评测校准。</p>\n          </div>\n        ` : null}\n      </div>\n    </section>\n\n    <section class=\"card\">\n      <h2>最近模考记录</h2>\n      ${hist.length === 0 ? html`<p class=\"muted\">暂无记录。</p>` : hist.map((h, i) => html`\n        <div class=\"q-card\" key=${i}>\n          <b>${h.date}</b>\n          <p class=\"muted\">L ${h.lRaw}/40 (Band ${h.lBand}) · R ${h.rRaw}/40 (Band ${h.rBand}) · W ${h.wLevel || '-'} · S ${h.sLevel || '-'}</p>\n        </div>\n      `)}\n    </section>\n  `;\n}\n","views/reading.js":"// views/reading.js\nimport { html } from 'https://esm.sh/htm@3.1.1/preact?external=preact';\nimport { useState } from 'https://esm.sh/preact@10.19.6/hooks';\nimport { state, mutate, awardDailyOnce } from '../state.js';\nimport { todayKey, sameAns } from '../utils.js';\nimport { PInput } from '../components/PersistentInput.js';\nimport { toast } from '../toast.js';\n\nexport function Reading({ items }) {\n  const todayK = todayKey();\n  const todayBucket = state.value.done[todayK] || { reading: [] };\n  const [showAns, setShowAns] = useState({});\n\n  function complete(i) {\n    if (todayBucket.reading.includes(i)) { toast('今日此篇已完成'); return; }\n    mutate(s => {\n      if (!s.done[todayK]) s.done[todayK] = { vocab:false, listening:[], reading:[], writing:false, speaking:false, mock:false };\n      if (!s.done[todayK].reading.includes(i)) s.done[todayK].reading.push(i);\n    });\n    awardDailyOnce('reading_' + i, 70);\n  }\n\n  return html`\n    <div class=\"stack\">\n      ${items.map((r, i) => {\n        const done = todayBucket.reading.includes(i);\n        return html`\n          <section class=\"card\" key=${i}>\n            <div class=\"tag-row\">\n              <span class=\"badge\">${r.type}</span>\n              <span class=\"badge\">Passage ${i + 1}</span>\n              ${done ? html`<span class=\"badge\" style=\"color:#bbf7d0;border-color:#22c55e\">✓ 今日已完成</span>` : null}\n            </div>\n            <h2>${r.title}</h2>\n            <div class=\"quote\">${r.passage}</div>\n            <h3>题目</h3>\n            ${r.qs.map((q, j) => html`\n              <div class=\"q-card\" key=${j}>\n                <p><b>${j + 1}. ${q.q}</b></p>\n                <${PInput}\n                  fieldId=${`reading_${i}_q${j}`}\n                  placeholder=\"你的答案\"\n                  date=${todayK}\n                />\n                <details open=${showAns[`${i}_${j}`]}>\n                  <summary>查看答案与定位逻辑</summary>\n                  <p class=\"good\">答案：${q.a}</p>\n                  <p class=\"muted\">${q.why}</p>\n                </details>\n              </div>\n            `)}\n            <button class=\"btn ok\" disabled=${done} onClick=${() => complete(i)}>\n              ${done ? '今日已完成' : '完成阅读 +70 XP'}\n            </button>\n          </section>\n        `;\n      })}\n    </div>\n  `;\n}\n","views/speaking.js":"// views/speaking.js\nimport { html } from 'https://esm.sh/htm@3.1.1/preact?external=preact';\nimport { useState } from 'https://esm.sh/preact@10.19.6/hooks';\nimport { state, mutate, awardDailyOnce } from '../state.js';\nimport { todayKey } from '../utils.js';\nimport { startTimer, stopTimer, timer, fmtTimer } from '../timer.js';\nimport { scoreSpeaking, levelLabel } from '../scoring.js';\nimport { PTextarea, readPersisted } from '../components/PersistentInput.js';\nimport { toast } from '../toast.js';\n\nexport function Speaking({ data }) {\n  const todayK = todayKey();\n  const todayBucket = state.value.done[todayK] || { speaking: false };\n  const [scoreResult, setScoreResult] = useState(null);\n  const t = timer.value;\n\n  function complete() {\n    if (todayBucket.speaking) { toast('今日已完成'); return; }\n    mutate(s => {\n      if (!s.done[todayK]) s.done[todayK] = { vocab:false, listening:[], reading:[], writing:false, speaking:false, mock:false };\n      s.done[todayK].speaking = true;\n    });\n    awardDailyOnce('speaking', 70);\n  }\n\n  function evaluate() {\n    // 等 250ms 确保 PTextarea 的 debounce(200ms) 已经写入\n    setTimeout(() => {\n      const text = readPersisted('speaking_transcript', todayK);\n      if (!text.trim()) { toast('请先把口语转写到下方文本框'); return; }\n      setScoreResult(scoreSpeaking(text));\n    }, 250);\n  }\n\n  return html`\n    <div class=\"stack\">\n      <section class=\"card\">\n        <h2>Part 1 · Rapid Fire</h2>\n        <p class=\"muted\">每题 45 秒。不要追求完美，追求不断句。</p>\n        ${data.part1.map((q, i) => html`<div class=\"quote\" key=${i}>${q}</div>`)}\n        <div class=\"row\" style=\"margin-top:8px\">\n          <button class=\"btn\" onClick=${() => startTimer(45, 'sp_p1')}>▶ 45 秒</button>\n          <span class=${`timer ${t.running && t.label==='sp_p1' ? 'running' : ''}`}>${t.label==='sp_p1' ? fmtTimer(t.seconds) : '00:45'}</span>\n        </div>\n      </section>\n\n      <section class=\"card\">\n        <h2>Part 2 · Cue Card</h2>\n        ${data.part2.map((c, i) => html`\n          <div class=\"q-card\" key=${i}>\n            <b>${c.topic}</b>\n            <ul style=\"margin:8px 0 0;padding-left:18px;color:#cbd5e1\">\n              ${c.points.map((p, pi) => html`<li key=${pi}>${p}</li>`)}\n            </ul>\n          </div>\n        `)}\n        <div class=\"row\" style=\"margin-top:8px\">\n          <button class=\"btn secondary\" onClick=${() => startTimer(60, 'sp_p2_prep')}>准备 1 分钟</button>\n          <button class=\"btn\" onClick=${() => startTimer(120, 'sp_p2_ans')}>作答 2 分钟</button>\n          <span class=${`timer ${t.running && (t.label==='sp_p2_prep' || t.label==='sp_p2_ans') ? 'running' : ''}`}>\n            ${(t.label==='sp_p2_prep' || t.label==='sp_p2_ans') ? fmtTimer(t.seconds) : '02:00'}\n          </span>\n        </div>\n      </section>\n\n      <section class=\"card\">\n        <h2>Part 3 · Debate Mode</h2>\n        ${data.part3.map((q, i) => html`<div class=\"quote\" key=${i}>${q}</div>`)}\n      </section>\n\n      <section class=\"card\">\n        <h2>转写自评</h2>\n        <p class=\"muted\">用手机录音 → 转写到下方 → 系统给启发式诊断（不评 Band 分）。</p>\n        <${PTextarea}\n          fieldId=\"speaking_transcript\"\n          placeholder=\"把口语回答转写到这里，越接近真实输出越好。\"\n          date=${todayK}\n        />\n        <div class=\"row\" style=\"margin-top:10px\">\n          <button class=\"btn\" onClick=${evaluate}>📊 启发式诊断</button>\n          <button class=\"btn ok\" disabled=${todayBucket.speaking} onClick=${complete}>\n            ${todayBucket.speaking ? '今日已完成' : '完成口语训练 +70 XP'}\n          </button>\n        </div>\n\n        ${scoreResult ? html`\n          <div class=\"q-card\" style=\"margin-top:12px\">\n            <p class=\"warnText\">⚠️ 启发式估算，基于文本长度、词汇丰富度、复杂句标记。<b>不等于</b> IELTS Band 分，且无法评估发音。</p>\n            <h3>综合等级：${scoreResult.overall} · ${scoreResult.overallLabel}</h3>\n            <div class=\"stat\">\n              <span class=\"pill\"><span class=\"k\">流利度</span>${scoreResult.dims.fluency}</span>\n              <span class=\"pill\"><span class=\"k\">词汇</span>${scoreResult.dims.lexical}</span>\n              <span class=\"pill\"><span class=\"k\">语法</span>${scoreResult.dims.grammar}</span>\n            </div>\n            <h3>诊断</h3>\n            ${scoreResult.issues.length ?\n              scoreResult.issues.map((x, i) => html`<p class=\"muted\" key=${i}>• ${x}</p>`) :\n              html`<p class=\"good\">文本指标看起来不错，但请用录音自评发音和流利度。</p>`\n            }\n            <p class=\"muted\" style=\"margin-top:8px\">${scoreResult.note}</p>\n          </div>\n        ` : null}\n      </section>\n    </div>\n  `;\n}\n","views/theory.js":"// views/theory.js\nimport { html } from 'https://esm.sh/htm@3.1.1/preact?external=preact';\n\nexport function Theory() {\n  return html`\n    <div class=\"stack\">\n      <section class=\"card\">\n        <h2>为什么这样设计</h2>\n        <p class=\"muted\">1）<b>词汇</b>采用主动回忆 + 间隔复习：先想，再看答案。认识 / 模糊 / 忘记会改变下次出现时间。</p>\n        <p class=\"muted\">2）<b>听力</b>采用精听闭环：听 → 写 → 核对 → 跟读。比只听播客更接近考试能力。</p>\n        <p class=\"muted\">3）<b>写作</b>采用局部练习 + 全文：先把句子、段落、结构拆开练，降低启动阻力。</p>\n        <p class=\"muted\">4）<b>评分</b>明确标\"启发式估算\"，用 L1–L5 等级避免和官方 Band 分混淆。重点在诊断维度，不在数字。</p>\n        <p class=\"muted\">5）<b>每周模考</b>而非每天：模考的价值在复盘，不在次数。</p>\n      </section>\n\n      <section class=\"card\">\n        <h2>评分的真相</h2>\n        <p class=\"warnText\">本应用的写作/口语评分基于文本统计（字数、TTR、连接词种类、复杂句标记），<b>无法</b>判断内容质量、连贯逻辑、地道表达、发音。</p>\n        <p class=\"muted\">把它当作\"诊断工具\"而不是\"评分工具\"。例如它能告诉你\"连接词种类只有 2 种\"、\"重复用了 5 次 important\"，这些是确定能改的事；它给出的 L3 / L4 等级<b>不</b>是 Band 6.5 / 7。</p>\n      </section>\n\n      <section class=\"card\">\n        <h2>使用纪律</h2>\n        <p class=\"danger\">不要把改 App 当成学习。每天最多 10 分钟改 App，其余时间必须完成任务。</p>\n        <p class=\"good\">最低有效剂量：10 个词 + 1 段听力 + 1 个输出任务。</p>\n      </section>\n\n      <section class=\"card\">\n        <h2>数据安全</h2>\n        <p class=\"muted\">所有数据存在浏览器本地 (localStorage)。<b>清缓存或换设备会丢</b>。建议每周用顶部\"导出\"按钮备份一次 JSON。</p>\n        <p class=\"muted\">导入会<b>覆盖</b>当前进度，请先导出旧数据再导入。</p>\n        <p class=\"muted\">输入框内容（听写、阅读答题、模考、写作）也会持久化，保留 30 天后自动清理。</p>\n      </section>\n\n      <section class=\"card\">\n        <h2>关于 TTS 朗读</h2>\n        <p class=\"warnText\">浏览器内置的语音合成不能代替真实考试音频。冲分阶段请用剑桥真题音频做精听，本应用只负责\"结构 + 词汇 + 跟读节奏\"的辅助训练。</p>\n      </section>\n    </div>\n  `;\n}\n","views/vocab.js":"// views/vocab.js\nimport { html } from 'https://esm.sh/htm@3.1.1/preact?external=preact';\nimport { useState, useEffect } from 'https://esm.sh/preact@10.19.6/hooks';\nimport { state, mutate } from '../state.js';\nimport { currentWord, scheduleWord, undoLast, canUndo, forceResetQueue, getWordState } from '../srs.js';\nimport { speak, ttsState } from '../tts.js';\n\nexport function Vocab({ words }) {\n  const [showMeaning, setShowMeaning] = useState(false);\n  const [recall, setRecall] = useState('');\n  const s = state.value;\n  const w = currentWord(words);\n\n  // 当前词变化时，重置回忆输入和\"显示答案\"状态\n  useEffect(() => {\n    setRecall('');\n    setShowMeaning(false);\n  }, [w?.w]);\n\n  // 键盘快捷键\n  useEffect(() => {\n    const handler = (e) => {\n      const tag = (e.target.tagName || '').toLowerCase();\n      if (tag === 'input' || tag === 'textarea') return;\n      if (e.key === ' ' && !showMeaning) {\n        e.preventDefault();\n        setShowMeaning(true);\n        return;\n      }\n      if (!showMeaning) return;\n      if (e.key === '1') doGrade('know');\n      else if (e.key === '2') doGrade('fuzzy');\n      else if (e.key === '3') doGrade('forget');\n    };\n    window.addEventListener('keydown', handler);\n    return () => window.removeEventListener('keydown', handler);\n  }, [showMeaning, w?.w]);\n\n  function doGrade(grade) {\n    scheduleWord(words, grade);\n    setShowMeaning(false);\n    setRecall('');\n  }\n\n  if (!w) {\n    return html`\n      <section class=\"card empty\">\n        <div class=\"em\">🎉</div>\n        <h2>今日单词已清空</h2>\n        <p class=\"muted\">明天再来。或者下方按钮强制再来一轮（不推荐）。</p>\n        <div class=\"row\" style=\"justify-content:center;margin-top:10px\">\n          <button class=\"btn secondary\" onClick=${() => forceResetQueue()}>强制重置今日队列</button>\n        </div>\n      </section>\n    `;\n  }\n\n  const ws = getWordState(words, w);\n  const queueLen = s.wordQueue.length;\n\n  return html`\n    <section class=\"card\">\n      <div
