class=\"tag-row\">\n        <span class=\"badge\">${w.cat}</span>\n        <span class=\"badge\">下次：${ws.due}</span>\n        <span class=\"badge\">间隔：${ws.interval}天</span>\n        <span class=\"badge\">Ease ${ws.ease.toFixed(2)}</span>\n        <span class=\"badge\">队列：${queueLen}</span>\n      </div>\n      <div class=\"word\">${w.w}</div>\n      <div class=\"pos\">${w.p}</div>\n      <div class=\"row\" style=\"justify-content:space-between;margin-top:4px\">\n        <div class=\"phon\">${w.ph}</div>\n        <button class=\"btn secondary\" onClick=${() => speak(w.w, { rate: Math.min(1.0, ttsState.value.wordRate) })}>🔊 发音</button>\n      </div>\n\n      <div style=\"margin-top:14px\">\n        ${showMeaning ? html`\n          <div class=\"meaning\">${w.cn}</div>\n          ${recall ? html`<p class=\"muted\">你的回忆：${recall}</p>` : null}\n          <div class=\"example\">${w.ex}</div>\n          <button class=\"btn secondary\" style=\"margin-top:10px\" onClick=${() => speak(w.ex)}>🔊 例句</button>\n        ` : html`\n          <p class=\"muted\">先在脑子里回忆中文意思，再按\"显示答案\"。</p>\n          <input\n            placeholder=\"（可选）输入你回忆的中文\"\n            value=${recall}\n            onInput=${e => setRecall(e.target.value)}\n          />\n        `}\n      </div>\n\n      <div class=\"row\" style=\"margin-top:14px\">\n        ${!showMeaning ? html`<button class=\"btn\" onClick=${() => setShowMeaning(true)}>显示答案 <kbd>Space</kbd></button>` : null}\n        <button class=\"btn ok\" disabled=${!showMeaning} onClick=${() => doGrade('know')}>认识 <kbd>1</kbd></button>\n        <button class=\"btn warn\" disabled=${!showMeaning} onClick=${() => doGrade('fuzzy')}>模糊 <kbd>2</kbd></button>\n        <button class=\"btn bad\" disabled=${!showMeaning} onClick=${() => doGrade('forget')}>忘记 <kbd>3</kbd></button>\n        <button class=\"ghost small\" disabled=${!canUndo()} onClick=${() => undoLast()} style=\"margin-left:auto\">↶ 撤销</button>\n      </div>\n      <p class=\"kbd-hint\">键盘：<kbd>Space</kbd> 显答案，<kbd>1</kbd>/<kbd>2</kbd>/<kbd>3</kbd> 评分</p>\n    </section>\n\n    <section class=\"card\">\n      <h3 class=\"section-title\">为什么这样练</h3>\n      <p class=\"muted\">认识：拉长间隔；模糊：短间隔再见；忘记：高频复习。核心不是\"看过\"，而是<b>主动回忆</b>——回忆失败才是大脑真正在编码。</p>\n    </section>\n  `;\n}\n","views/writing.js":"// views/writing.js\nimport { html } from 'https://esm.sh/htm@3.1.1/preact?external=preact';\nimport { useState, useEffect } from 'https://esm.sh/preact@10.19.6/hooks';\nimport { state, mutate, awardDailyOnce } from '../state.js';\nimport { todayKey, wordCountOf } from '../utils.js';\nimport { startTimer, stopTimer, timer, fmtTimer } from '../timer.js';\nimport { scoreWriting, levelLabel } from '../scoring.js';\nimport { toast } from '../toast.js';\n\nexport function Writing({ items }) {\n  const todayK = todayKey();\n  const draft = state.value.writing[todayK] || '';\n  const [text, setText] = useState(draft);\n  const [scoreResult, setScoreResult] = useState(null);\n  const [taskType, setTaskType] = useState('task2');\n  const t = timer.value;\n\n  // 持久化（每次 text 变化 debounce 写入）\n  useEffect(() => {\n    const id = setTimeout(() => {\n      mutate(s => { s.writing[todayK] = text; });\n    }, 300);\n    return () => clearTimeout(id);\n  }, [text]);\n\n  const drafts = Object.keys(state.value.writing)\n    .filter(k => state.value.writing[k] && state.value.writing[k].trim())\n    .sort().reverse().slice(0, 10);\n\n  function loadPrompt(i) {\n    setText(text + `\\n\\n【${items[i].title}】\\n${items[i].prompt}\\n\\n`);\n  }\n\n  function saveDraft() {\n    const trimmed = text.trim();\n    const wc = wordCountOf(trimmed);\n    if (!trimmed) { toast('草稿为空'); return; }\n    if (wc < 50) { toast('至少写 50 个英文词再算完成'); return; }\n    mutate(s => {\n      s.writing[todayK] = text;\n      if (!s.done[todayK]) s.done[todayK] = { vocab:false, listening:[], reading:[], writing:false, speaking:false, mock:false };\n      s.done[todayK].writing = true;\n    });\n    awardDailyOnce('writing', 80);\n  }\n\n  function evaluate() {\n    if (!text.trim()) { toast('请先写一点东西'); return; }\n    setScoreResult(scoreWriting(text, taskType));\n  }\n\n  function clearDraft() {\n    if (!confirm('清空今日草稿？')) return;\n    setText('');\n    setScoreResult(null);\n  }\n\n  function loadOld(k) {\n    setText(state.value.writing[k]);\n    toast(`已载入 ${k}`);\n  }\n\n  function deleteDraft(k) {\n    if (!confirm(`删除草稿 ${k}？`)) return;\n    mutate(s => { delete s.writing[k]; });\n  }\n\n  const wc = wordCountOf(text);\n\n  return html`\n    <section class=\"card\">\n      <div class=\"row\">\n        <span class=${`timer ${t.running && t.label==='writing' ? 'running' : ''}`}>${t.label === 'writing' ? fmtTimer(t.seconds) : '40:00'}</span>\n        <button class=\"btn\" onClick=${() => startTimer(2400, 'writing')}>▶ 40 分钟</button>\n        <button class=\"btn secondary\" onClick=${() => startTimer(900, 'writing')}>15 分钟快战</button>\n        <button class=\"btn secondary\" onClick=${() => stopTimer()}>⏹ 暂停</button>\n      </div>\n      <p class=\"muted\" style=\"margin-top:8px\">写作不是憋完整篇。先练局部：引言、主题句、扩句、改写，再打完整篇。</p>\n    </section>\n\n    <div class=\"stack\">\n      ${items.map((w, i) => html`\n        <section class=\"card\" key=${i}>\n          <div class=\"tag-row\"><span class=\"badge\">${w.mode}</span></div>\n          <h2>${w.title}</h2>\n          <div class=\"quote\">${w.prompt}</div>\n          <p class=\"muted\">提示：${w.hint}</p>\n          <button class=\"btn secondary\" onClick=${() => loadPrompt(i)}>使用这个题目</button>\n        </section>\n      `)}\n\n      <section class=\"card\">\n        <h2>在线编辑器 · ${todayK}</h2>\n        <textarea\n          class=\"textarea\"\n          placeholder=\"在这里写，自动保存。\"\n          value=${text}\n          onInput=${e => setText(e.target.value)}\n        ></textarea>\n        <div class=\"row\" style=\"margin-top:10px\">\n          <span class=\"pill\">${wc} words</span>\n          <span class=\"badge\">完成线：≥50；Task 2 ≥250</span>\n          <select value=${taskType} onChange=${e => setTaskType(e.target.value)}>\n            <option value=\"task1\">Task 1 (≥150)</option>\n            <option value=\"task2\">Task 2 (≥250)</option>\n          </select>\n          <button class=\"btn\" onClick=${evaluate}>📊 启发式估算</button>\n          <button class=\"btn ok\" onClick=${saveDraft}>保存 +80 XP</button>\n          <button class=\"btn secondary\" onClick=${clearDraft}>清空</button>\n        </div>\n\n        ${scoreResult ? html`\n          <div class=\"q-card\" style=\"margin-top:12px\">\n            <p class=\"warnText\">⚠️ 这是<b>启发式估算</b>，基于字数、连接词种类、词汇丰富度、复杂句数量计算，<b>不等于</b> IELTS Band 分。</p>\n            <h3>综合等级：${scoreResult.overall} · ${scoreResult.overallLabel}</h3>\n            <div class=\"stat\">\n              <span class=\"pill\"><span class=\"k\">任务完成</span>${scoreResult.dims.task}</span>\n              <span class=\"pill\"><span class=\"k\">连贯衔接</span>${scoreResult.dims.coherence}</span>\n              <span class=\"pill\"><span class=\"k\">词汇</span>${scoreResult.dims.lexical}</span>\n              <span class=\"pill\"><span class=\"k\">语法</span>${scoreResult.dims.grammar}</span>\n            </div>\n            <h3>诊断</h3>\n            ${scoreResult.issues.length ?\n              scoreResult.issues.map((x, i) => html`<p class=\"muted\" key=${i}>• ${x}</p>`) :\n              html`<p class=\"good\">没发现明显问题。但启发式无法检测内容质量、连贯度逻辑、地道表达。</p>`\n            }\n            <h3>文本指标</h3>\n            <p class=\"muted\">字数 ${scoreResult.stats.n} · 句数 ${scoreResult.stats.sentences} · 平均句长 ${scoreResult.stats.avg.toFixed(1)} · TTR ${(scoreResult.stats.ttr*100).toFixed(0)}% · 连接词种类 ${scoreResult.stats.distinctConnectors} · 从句标记 ${scoreResult.stats.complex}</p>\n          </div>\n        ` : null}\n\n        <h3>自查清单</h3>\n        <div class=\"checklist\">\n          <label><input type=\"checkbox\" />是否明确回答题目？</label>\n          <label><input type=\"checkbox\" />每段是否只有一个中心？</label>\n          <label><input type=\"checkbox\" />是否有例子支撑？</label>\n          <label><input type=\"checkbox\" />是否检查主谓一致 / 冠词 / 单复数？</label>\n        </div>\n      </section>\n\n      <section class=\"card\">\n        <h2>历史草稿</h2>\n        ${drafts.length === 0 ? html`<p class=\"muted\">还没有历史草稿。</p>` : html`\n          <div class=\"stack\">\n            ${drafts.map(k => {\n              const count = wordCountOf(state.value.writing[k]);\n              return html`\n                <details key=${k} open=${k === todayK}>\n                  <summary>${k} · ${count} words ${k === todayK ? '(今日)' : ''}</summary>\n                  <pre style=\"white-space:pre-wrap;color:#cbd5e1;font-family:inherit;margin:8px 0 0\">${state.value.writing[k]}</pre>\n                  ${k !== todayK ? html`\n                    <div class=\"row\" style=\"margin-top:8px\">\n                      <button class=\"btn secondary\" onClick=${() => loadOld(k)}>载入到编辑器</button>\n                      <button class=\"btn bad\" onClick=${() => deleteDraft(k)}>删除</button>\n                    </div>\n                  ` : null}\n                </details>\n              `;\n            })}\n          </div>\n        `}\n      </section>\n    </div>\n  `;\n}\n"};

function rewriteRelative(src, modulePath, blobMap) {
  const dir = modulePath.includes('/') ? modulePath.split('/').slice(0, -1).join('/') : '';
  return src.replace(/from\s+(['"`])(\.[^'"`]+)\1/g, (match, quote, rel) => {
    let resolved = rel.startsWith('./') ? rel.slice(2) : rel;
    let baseDir = dir;
    while (resolved.startsWith('../')) {
      resolved = resolved.slice(3);
      baseDir = baseDir.split('/').slice(0, -1).join('/');
    }
    const target = (baseDir ? baseDir + '/' : '') + resolved;
    if (!blobMap[target]) {
      console.error('Cannot resolve', target, 'from', modulePath);
      return match;
    }
    return 'from ' + quote + blobMap[target] + quote;
  });
}

function topoOrder() {
  const order = [];
  const visited = new Set();
  function visit(name) {
    if (visited.has(name)) return;
    visited.add(name);
    const src = __modules__[name];
    if (!src) return;
    const dir = name.includes('/') ? name.split('/').slice(0, -1).join('/') : '';
    for (const m of src.matchAll(/from\s+['"`](\.[^'"`]+)['"`]/g)) {
      let resolved = m[1].startsWith('./') ? m[1].slice(2) : m[1];
      let baseDir = dir;
      while (resolved.startsWith('../')) {
        resolved = resolved.slice(3);
        baseDir = baseDir.split('/').slice(0, -1).join('/');
      }
      const target = (baseDir ? baseDir + '/' : '') + resolved;
      visit(target);
    }
    order.push(name);
  }
  for (const name of Object.keys(__modules__)) visit(name);
  return order;
}

const blobMap = {};
for (const name of topoOrder()) {
  const rewritten = rewriteRelative(__modules__[name], name, blobMap);
  const blob = new Blob([rewritten], { type: 'text/javascript' });
  blobMap[name] = URL.createObjectURL(blob);
}

import(blobMap['app.js']).catch(err => {
  console.error(err);
  document.getElementById('app').innerHTML = '<div style="margin:20px;padding:20px;border:1px solid #ef4444;border-radius:12px;background:#1f1117;color:#fecaca"><h2>启动失败</h2><pre style="white-space:pre-wrap;font-family:monospace">' + (err.stack || err.message) + '</pre></div>';
});

</script>
